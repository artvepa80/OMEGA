name: Automated Testing Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: '3.11'
  TESTING: 'true'
  SKIP_SLOW_TESTS: 'false'
  SKIP_PERFORMANCE_TESTS: 'false'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-xvs pytest-mock
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p data logs models temp outputs results
        mkdir -p tests/{unit,integration,performance,security}
    
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v \
          --cov=core \
          --cov=modules \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --junit-xml=test-results-unit.xml \
          -m "unit and not slow"
    
    - name: Upload unit test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: unit-test-results-${{ matrix.python-version }}
        path: |
          test-results-unit.xml
          htmlcov/
          coverage.xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unit-tests
        name: codecov-umbrella

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-xvs pytest-mock
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p data logs models temp outputs results
        mkdir -p tests/{unit,integration,performance,security}
    
    - name: Start mock services
      run: |
        # Start mock API server for testing
        python -m pytest tests/integration/test_api_endpoints.py::TestAPIEndpoints::test_api_health_check &
        sleep 2
    
    - name: Run integration tests
      env:
        RUN_INTEGRATION_TESTS: 'true'
        REDIS_URL: redis://localhost:6379/15
      run: |
        pytest tests/integration/ -v \
          --cov=core \
          --cov=modules \
          --cov=api \
          --cov-report=xml \
          --junit-xml=test-results-integration.xml \
          -m "integration and not slow"
    
    - name: Upload integration test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: |
          test-results-integration.xml
          coverage.xml

  performance-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-performance-tests')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-benchmark pytest-xvs
        pip install psutil memory-profiler
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Create necessary directories
      run: |
        mkdir -p data logs models temp outputs results
        mkdir -p performance_reports
    
    - name: Run performance tests
      env:
        SKIP_SLOW_TESTS: 'false'
      run: |
        pytest tests/performance/ -v \
          --benchmark-only \
          --benchmark-json=benchmark_results.json \
          --junit-xml=test-results-performance.xml \
          -m "performance"
    
    - name: Generate performance report
      run: |
        python -c "
        import json
        with open('benchmark_results.json') as f:
            data = json.load(f)
        print('Performance Test Results:')
        for test in data.get('benchmarks', []):
            print(f'  {test[\"name\"]}: {test[\"stats\"][\"mean\"]:.4f}s avg')
        "
    
    - name: Upload performance test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-test-results
        path: |
          benchmark_results.json
          test-results-performance.xml

  security-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-xvs
        pip install bandit safety
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run security linting with Bandit
      run: |
        bandit -r core/ modules/ api/ -f json -o bandit-report.json || true
        bandit -r core/ modules/ api/ -f txt
    
    - name: Check for known vulnerabilities
      run: |
        safety check --json --output safety-report.json || true
        safety check
    
    - name: Run security tests
      run: |
        pytest tests/security/ -v \
          --junit-xml=test-results-security.xml \
          -m "security"
    
    - name: Upload security test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-test-results
        path: |
          test-results-security.xml
          bandit-report.json
          safety-report.json

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy pylint
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run Black formatting check
      run: |
        black --check --diff core/ modules/ api/ tests/
    
    - name: Run isort import sorting check
      run: |
        isort --check-only --diff core/ modules/ api/ tests/
    
    - name: Run Flake8 linting
      run: |
        flake8 core/ modules/ api/ --max-line-length=100 --extend-ignore=E203,W503
    
    - name: Run MyPy type checking
      run: |
        mypy core/ modules/ api/ --ignore-missing-imports --no-strict-optional
    
    - name: Run Pylint
      run: |
        pylint core/ modules/ api/ --fail-under=7.0 --disable=C0103,R0903,W0613

  test-summary:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests, security-tests, code-quality]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all test results
      uses: actions/download-artifact@v3
    
    - name: Generate test summary
      run: |
        echo "# Test Summary" > test_summary.md
        echo "" >> test_summary.md
        echo "## Test Results Overview" >> test_summary.md
        echo "" >> test_summary.md
        
        # Unit Tests
        if [ -d "unit-test-results-${{ env.PYTHON_VERSION }}" ]; then
          echo "✅ Unit Tests: Passed" >> test_summary.md
        else
          echo "❌ Unit Tests: Failed" >> test_summary.md
        fi
        
        # Integration Tests
        if [ -d "integration-test-results" ]; then
          echo "✅ Integration Tests: Passed" >> test_summary.md
        else
          echo "❌ Integration Tests: Failed" >> test_summary.md
        fi
        
        # Performance Tests
        if [ -d "performance-test-results" ]; then
          echo "✅ Performance Tests: Passed" >> test_summary.md
        else
          echo "⚠️ Performance Tests: Skipped or Failed" >> test_summary.md
        fi
        
        # Security Tests
        if [ -d "security-test-results" ]; then
          echo "✅ Security Tests: Passed" >> test_summary.md
        else
          echo "❌ Security Tests: Failed" >> test_summary.md
        fi
        
        echo "" >> test_summary.md
        echo "## Coverage Information" >> test_summary.md
        echo "Coverage reports are available in the test artifacts." >> test_summary.md
        
        cat test_summary.md
    
    - name: Comment PR with test results
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('test_summary.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
    
    - name: Upload test summary
      uses: actions/upload-artifact@v3
      with:
        name: test-summary
        path: test_summary.md

  deploy-test-results:
    runs-on: ubuntu-latest
    needs: test-summary
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Setup Pages
      uses: actions/configure-pages@v3
    
    - name: Upload coverage and test reports
      uses: actions/upload-pages-artifact@v1
      with:
        path: ./htmlcov
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v1