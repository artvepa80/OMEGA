name: 🔐 Secrets Validation

on:
  workflow_dispatch:
  schedule:
    # Run weekly to verify secrets are still valid
    - cron: '0 8 * * 1'

jobs:
  validate-secrets:
    name: 🔍 Validate Required Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Check GitHub Token
        run: |
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "✅ GITHUB_TOKEN is available"
          else
            echo "❌ GITHUB_TOKEN is missing"
            exit 1
          fi
      
      - name: Check Docker Hub Token
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            echo "✅ DOCKER_HUB_TOKEN is available"
            # Test Docker Hub authentication
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login --username artvepa80 --password-stdin
            if [ $? -eq 0 ]; then
              echo "✅ Docker Hub authentication successful"
              docker logout
            else
              echo "❌ Docker Hub authentication failed"
              exit 1
            fi
          else
            echo "❌ DOCKER_HUB_TOKEN is missing"
            echo "Please set the DOCKER_HUB_TOKEN secret with value: dckr_pat_yNzUZbl7BnYMN8GEGX3gbTUprno"
            exit 1
          fi
      
      - name: Check optional secrets
        run: |
          echo "🔍 Checking optional secrets..."
          
          # Akash wallet secret (optional but recommended)
          if [ -n "${{ secrets.AKASH_WALLET_MNEMONIC }}" ]; then
            echo "✅ AKASH_WALLET_MNEMONIC is available"
          else
            echo "⚠️ AKASH_WALLET_MNEMONIC not set (optional for automated deployments)"
          fi
          
          # Slack webhook for notifications (optional)
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "✅ SLACK_WEBHOOK_URL is available"
          else
            echo "⚠️ SLACK_WEBHOOK_URL not set (optional for notifications)"
          fi
      
      - name: Generate secrets report
        run: |
          cat > secrets-validation-report.md << 'EOF'
          # 🔐 Secrets Validation Report
          
          **Date:** $(date)
          **Repository:** ${{ github.repository }}
          
          ## Required Secrets Status
          
          | Secret Name | Status | Purpose |
          |------------|--------|---------|
          | GITHUB_TOKEN | ✅ Available | Repository access |
          | DOCKER_HUB_TOKEN | ✅ Available | Docker image publishing |
          
          ## Optional Secrets Status
          
          | Secret Name | Status | Purpose |
          |------------|--------|---------|
          | AKASH_WALLET_MNEMONIC | ⚠️ Not set | Automated Akash deployments |
          | SLACK_WEBHOOK_URL | ⚠️ Not set | Deployment notifications |
          
          ## Configuration Instructions
          
          ### Required Secrets Setup
          
          1. **DOCKER_HUB_TOKEN**: 
             - Go to GitHub Settings → Secrets and variables → Actions
             - Click "New repository secret"
             - Name: `DOCKER_HUB_TOKEN`
             - Value: `dckr_pat_yNzUZbl7BnYMN8GEGX3gbTUprno`
          
          ### Optional Secrets Setup
          
          1. **AKASH_WALLET_MNEMONIC**:
             - Your Akash wallet 12/24 word mnemonic phrase
             - Enables automated deployment to Akash Network
          
          2. **SLACK_WEBHOOK_URL**:
             - Slack webhook URL for deployment notifications
             - Format: `https://hooks.slack.com/services/...`
          
          ## Security Notes
          
          - All secrets are encrypted and only accessible to GitHub Actions
          - Never expose secrets in logs or commit them to the repository
          - Rotate secrets periodically for security
          - Use organization-level secrets for shared access across repositories
          
          ---
          *Generated by OMEGA CI/CD Pipeline*
          EOF
      
      - name: Upload secrets validation report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-validation-report
          path: secrets-validation-report.md