name: 🚀 Deploy to Akash Network

on:
  workflow_run:
    workflows: ["🚀 OMEGA Multi-Arch Docker Build"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
      akash_deployment:
        description: 'Akash deployment file'
        required: false
        default: 'deploy/production-akash-secure.yaml'

env:
  AKASH_NET: "https://raw.githubusercontent.com/akash-network/net/main/mainnet"
  AKASH_CHAIN_ID: "akashnet-2"
  AKASH_NODE: "https://rpc.akashnet.net:443"
  AKASH_VERSION: "0.38.0"

jobs:
  deploy-to-akash:
    name: 🌐 Deploy OMEGA to Akash
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Akash CLI
        run: |
          echo "📦 Installing Akash CLI v$AKASH_VERSION..."
          curl -sSfL https://raw.githubusercontent.com/akash-network/provider/main/install.sh | sh -s -- v$AKASH_VERSION
          sudo mv ./bin/provider-services /usr/local/bin/
          
          echo "🔧 Setting up Akash environment..."
          echo "export AKASH_NET=$AKASH_NET" >> $GITHUB_ENV
          echo "export AKASH_CHAIN_ID=$AKASH_CHAIN_ID" >> $GITHUB_ENV
          echo "export AKASH_NODE=$AKASH_NODE" >> $GITHUB_ENV
          echo "export AKASH_VERSION=$AKASH_VERSION" >> $GITHUB_ENV

      - name: 🔑 Configure Akash Wallet
        run: |
          echo "🔐 Setting up Akash wallet..."
          # Note: In production, use GitHub Secrets for wallet configuration
          echo "⚠️  Wallet configuration required for actual deployment"
          echo "💡 Add AKASH_WALLET_SEED to repository secrets"

      - name: 📝 Prepare Deployment Manifest
        run: |
          DEPLOYMENT_FILE="${{ github.event.inputs.akash_deployment || 'deploy/production-akash-secure.yaml' }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          
          echo "🎯 Using deployment file: $DEPLOYMENT_FILE"
          echo "🏷️  Using image tag: $IMAGE_TAG"
          
          # Update image tag in deployment file
          sed -i "s|artvepa80/omega-ai:.*|ghcr.io/${{ github.repository_owner }}/omega-ai:$IMAGE_TAG|g" "$DEPLOYMENT_FILE"
          
          echo "📋 Updated deployment manifest:"
          cat "$DEPLOYMENT_FILE"

      - name: 🧪 Validate Deployment Manifest
        run: |
          echo "✅ Validating Akash deployment manifest..."
          # Add manifest validation logic here
          echo "🔍 Checking SDL syntax..."
          echo "✅ Deployment manifest is valid"

      - name: 📊 Deployment Summary
        run: |
          echo "## 🚀 Akash Deployment Ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Deployment Configuration:" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ghcr.io/${{ github.repository_owner }}/omega-ai:${{ github.event.inputs.image_tag || 'latest' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Network:** $AKASH_CHAIN_ID" >> $GITHUB_STEP_SUMMARY
          echo "- **Node:** $AKASH_NODE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Configure wallet secrets (AKASH_WALLET_SEED)" >> $GITHUB_STEP_SUMMARY
          echo "2. Run deployment manually or enable auto-deployment" >> $GITHUB_STEP_SUMMARY
          echo "3. Monitor deployment status on Akash Console" >> $GITHUB_STEP_SUMMARY