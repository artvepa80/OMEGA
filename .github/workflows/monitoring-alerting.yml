name: 📊 Monitoring & Alerting Setup

on:
  workflow_dispatch:
  schedule:
    # Run every 6 hours to check system health
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
    paths:
      - 'monitoring/**'
      - '.github/workflows/monitoring-alerting.yml'

env:
  AKASH_DEPLOYMENT_URL: https://f4o5gi3c0tfmvblt4avi2l6o08.ingress.akash.win

jobs:
  setup-monitoring:
    name: 🔧 Setup Monitoring Infrastructure
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create monitoring directory structure
        run: |
          mkdir -p monitoring/{prometheus,grafana,alertmanager}
          mkdir -p monitoring/config/{prometheus,grafana,alertmanager}
          mkdir -p monitoring/dashboards
      
      - name: Generate Prometheus configuration
        run: |
          cat > monitoring/config/prometheus/prometheus.yml << 'EOF'
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
          
          rule_files:
            - "alert_rules.yml"
          
          alerting:
            alertmanagers:
              - static_configs:
                  - targets:
                    - alertmanager:9093
          
          scrape_configs:
            - job_name: 'omega-api'
              static_configs:
                - targets: ['f4o5gi3c0tfmvblt4avi2l6o08.ingress.akash.win:80']
              metrics_path: /metrics
              scrape_interval: 30s
              scrape_timeout: 10s
              
            - job_name: 'omega-health'
              static_configs:
                - targets: ['f4o5gi3c0tfmvblt4avi2l6o08.ingress.akash.win:80']
              metrics_path: /health
              scrape_interval: 60s
          EOF
      
      - name: Generate alert rules
        run: |
          cat > monitoring/config/prometheus/alert_rules.yml << 'EOF'
          groups:
            - name: omega_alerts
              rules:
                - alert: OmegaAPIDown
                  expr: up{job="omega-api"} == 0
                  for: 1m
                  labels:
                    severity: critical
                  annotations:
                    summary: "OMEGA API is down"
                    description: "OMEGA API has been down for more than 1 minute"
                
                - alert: OmegaAPIHighErrorRate
                  expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High error rate detected"
                    description: "Error rate is above 10% for the last 5 minutes"
                
                - alert: OmegaAPIHighLatency
                  expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
                  for: 5m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High latency detected"
                    description: "95th percentile latency is above 1 second"
                
                - alert: OmegaAPIMemoryUsage
                  expr: (process_resident_memory_bytes / 1024 / 1024) > 2048
                  for: 10m
                  labels:
                    severity: warning
                  annotations:
                    summary: "High memory usage"
                    description: "Memory usage is above 2GB"
          EOF
      
      - name: Generate Grafana datasource configuration
        run: |
          mkdir -p monitoring/grafana/config/provisioning/datasources
          cat > monitoring/grafana/config/provisioning/datasources/prometheus.yml << 'EOF'
          apiVersion: 1
          
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus:9090
              isDefault: true
              editable: true
          EOF
      
      - name: Generate basic Grafana dashboard
        run: |
          mkdir -p monitoring/grafana/config/provisioning/dashboards
          cat > monitoring/grafana/config/provisioning/dashboards/omega.json << 'EOF'
          {
            "dashboard": {
              "id": null,
              "title": "OMEGA AI Monitoring Dashboard",
              "tags": ["omega", "ai", "monitoring"],
              "style": "dark",
              "timezone": "browser",
              "panels": [
                {
                  "id": 1,
                  "title": "API Uptime",
                  "type": "stat",
                  "targets": [
                    {
                      "expr": "up{job=\"omega-api\"}",
                      "legendFormat": "API Status"
                    }
                  ],
                  "fieldConfig": {
                    "defaults": {
                      "mappings": [
                        {
                          "options": {
                            "0": {
                              "text": "DOWN",
                              "color": "red"
                            },
                            "1": {
                              "text": "UP",
                              "color": "green"
                            }
                          },
                          "type": "value"
                        }
                      ]
                    }
                  },
                  "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 0
                  }
                },
                {
                  "id": 2,
                  "title": "Request Rate",
                  "type": "graph",
                  "targets": [
                    {
                      "expr": "rate(http_requests_total[5m])",
                      "legendFormat": "Requests/sec"
                    }
                  ],
                  "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 0
                  }
                }
              ],
              "time": {
                "from": "now-1h",
                "to": "now"
              },
              "refresh": "5s"
            }
          }
          EOF
      
      - name: Generate AlertManager configuration
        run: |
          cat > monitoring/config/alertmanager/alertmanager.yml << 'EOF'
          global:
            smtp_smarthost: 'localhost:587'
            smtp_from: 'alerts@omega-ai.com'
          
          route:
            group_by: ['alertname']
            group_wait: 10s
            group_interval: 10s
            repeat_interval: 1h
            receiver: 'omega-team'
          
          receivers:
            - name: 'omega-team'
              webhook_configs:
                - url: 'http://omega-webhook:5000/alerts'
                  send_resolved: true
          EOF
      
      - name: Validate monitoring configurations
        run: |
          echo "🔍 Validating monitoring configurations..."
          
          # Validate YAML files
          python -c "
          import yaml
          import os
          
          config_files = [
              'monitoring/config/prometheus/prometheus.yml',
              'monitoring/config/prometheus/alert_rules.yml',
              'monitoring/config/alertmanager/alertmanager.yml',
              'monitoring/grafana/config/provisioning/datasources/prometheus.yml'
          ]
          
          for file in config_files:
              if os.path.exists(file):
                  try:
                      with open(file) as f:
                          yaml.safe_load(f)
                      print(f'✅ {file} is valid')
                  except Exception as e:
                      print(f'❌ {file} has invalid YAML: {e}')
              else:
                  print(f'⚠️ {file} not found')
          "
          
          echo "✅ Configuration validation completed"
      
      - name: Upload monitoring configuration
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-config
          path: monitoring/
          retention-days: 30

  health-check:
    name: 🏥 Health Check OMEGA Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Check API health
        run: |
          echo "🏥 Checking OMEGA API health..."
          
          API_URL="${{ env.AKASH_DEPLOYMENT_URL }}"
          
          # Health check with retries
          for i in {1..5}; do
            echo "Health check attempt $i/5..."
            
            if curl -f -s "$API_URL/health" > /dev/null; then
              echo "✅ API is healthy"
              HEALTH_STATUS="healthy"
              break
            elif [ $i -eq 5 ]; then
              echo "❌ API health check failed after 5 attempts"
              HEALTH_STATUS="unhealthy"
            else
              echo "⏳ Waiting 30 seconds before retry..."
              sleep 30
            fi
          done
          
          echo "HEALTH_STATUS=$HEALTH_STATUS" >> $GITHUB_ENV
      
      - name: Check API endpoints
        if: env.HEALTH_STATUS == 'healthy'
        run: |
          echo "🧪 Testing API endpoints..."
          
          API_URL="${{ env.AKASH_DEPLOYMENT_URL }}"
          
          # Test different endpoints
          endpoints=("/health" "/status" "/predict")
          
          for endpoint in "${endpoints[@]}"; do
            echo "Testing $endpoint..."
            response=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL$endpoint" || echo "000")
            
            if [ "$response" = "200" ] || [ "$response" = "405" ]; then
              echo "✅ $endpoint: HTTP $response"
            else
              echo "⚠️ $endpoint: HTTP $response"
            fi
          done
      
      - name: Performance check
        if: env.HEALTH_STATUS == 'healthy'
        run: |
          echo "📊 Running performance check..."
          
          API_URL="${{ env.AKASH_DEPLOYMENT_URL }}/health"
          total_time=0
          requests=5
          
          for i in $(seq 1 $requests); do
            start_time=$(date +%s%N)
            curl -s "$API_URL" > /dev/null
            end_time=$(date +%s%N)
            
            response_time=$(( (end_time - start_time) / 1000000 ))
            total_time=$((total_time + response_time))
            
            echo "Request $i: ${response_time}ms"
          done
          
          avg_time=$((total_time / requests))
          echo "Average response time: ${avg_time}ms"
          
          if [ $avg_time -lt 1000 ]; then
            echo "✅ Performance within acceptable range"
          else
            echo "⚠️ Performance may be degraded (>${avg_time}ms average)"
          fi

  generate-monitoring-report:
    name: 📋 Generate Monitoring Report
    runs-on: ubuntu-latest
    needs: [setup-monitoring, health-check]
    if: always()
    
    steps:
      - name: Create monitoring report
        run: |
          cat > monitoring-report.md << 'EOF'
          # 📊 OMEGA AI Monitoring Report
          
          **Date:** $(date)
          **Deployment:** ${{ env.AKASH_DEPLOYMENT_URL }}
          
          ## System Status
          - **Health Check:** ${{ needs.health-check.result }}
          - **Monitoring Setup:** ${{ needs.setup-monitoring.result }}
          
          ## Monitoring Infrastructure
          
          ### ✅ Configured Components
          - Prometheus metrics collection
          - Grafana dashboard visualization
          - AlertManager notification system
          - Health check automation
          
          ### 📋 Alert Rules
          - OmegaAPIDown: API unavailability detection
          - OmegaAPIHighErrorRate: Error rate monitoring
          - OmegaAPIHighLatency: Performance monitoring
          - OmegaAPIMemoryUsage: Resource monitoring
          
          ### 🔍 Monitoring Endpoints
          - Health: /health
          - Metrics: /metrics (if implemented)
          - Status: /status
          
          ## Next Steps
          1. Deploy monitoring stack to production environment
          2. Configure alert notifications (Slack, email, etc.)
          3. Set up log aggregation and analysis
          4. Implement custom application metrics
          5. Create runbooks for common alerts
          
          ---
          *Generated by OMEGA AI Monitoring System*
          EOF
          
      - name: Upload monitoring report
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-report
          path: monitoring-report.md