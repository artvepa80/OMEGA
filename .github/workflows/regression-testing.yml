name: OMEGA Regression Testing Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:    # Manual trigger

env:
  PYTHON_VERSION: '3.11'

jobs:
  # API Regression Tests
  api-regression:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest requests httpx pytest-asyncio
          
      - name: Start OMEGA API server
        run: |
          python api_interface.py &
          echo $! > api_server.pid
          sleep 30  # Wait for server to start
          
      - name: Test API endpoints
        run: |
          python -c "
          import requests
          import json
          import sys
          
          base_url = 'http://localhost:8000'
          
          # Test health endpoint
          try:
              response = requests.get(f'{base_url}/health', timeout=10)
              assert response.status_code == 200
              print('✓ Health endpoint working')
          except Exception as e:
              print(f'✗ Health endpoint failed: {e}')
              sys.exit(1)
          
          # Test prediction endpoint
          try:
              test_data = {'test': True, 'quick_predict': True}
              response = requests.post(f'{base_url}/predict', 
                                     json=test_data, timeout=30)
              if response.status_code in [200, 202]:
                  print('✓ Prediction endpoint working')
              else:
                  print(f'⚠ Prediction endpoint returned: {response.status_code}')
          except Exception as e:
              print(f'⚠ Prediction endpoint test failed: {e}')
          
          # Test status endpoint
          try:
              response = requests.get(f'{base_url}/status', timeout=10)
              if response.status_code == 200:
                  print('✓ Status endpoint working')
          except Exception as e:
              print(f'⚠ Status endpoint failed: {e}')
          "
          
      - name: Cleanup API server
        if: always()
        run: |
          if [ -f api_server.pid ]; then
            kill $(cat api_server.pid) || true
            rm api_server.pid
          fi

  # ML Model Regression Tests
  ml-regression:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install ML dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-learn==1.3.0 torch numpy pandas
          
      - name: Test ML model consistency
        run: |
          python -c "
          import numpy as np
          import joblib
          import torch
          import os
          import sys
          from datetime import datetime
          
          print('🧪 Testing ML Model Consistency...')
          
          # Test data for consistency checks
          test_input = np.random.rand(10, 50)  # Sample input shape
          
          # Test GBoost model if exists
          if os.path.exists('models/gboost_model.pkl'):
              try:
                  model = joblib.load('models/gboost_model.pkl')
                  # Test prediction consistency
                  pred1 = model.predict(test_input)
                  pred2 = model.predict(test_input)
                  assert np.array_equal(pred1, pred2), 'GBoost predictions not consistent'
                  print('✓ GBoost model consistency test passed')
              except Exception as e:
                  print(f'⚠ GBoost model test failed: {e}')
          
          # Test ensemble models if they exist
          import glob
          ensemble_files = glob.glob('models/ensemble_model_*.joblib')
          for model_file in ensemble_files:
              try:
                  model = joblib.load(model_file)
                  print(f'✓ Ensemble model {model_file} loads successfully')
              except Exception as e:
                  print(f'✗ Ensemble model {model_file} failed: {e}')
          
          # Test PyTorch models if they exist
          torch_files = glob.glob('modules/*.pth')
          for model_file in torch_files:
              try:
                  model = torch.load(model_file, map_location='cpu')
                  print(f'✓ PyTorch model {model_file} loads successfully')
              except Exception as e:
                  print(f'✗ PyTorch model {model_file} failed: {e}')
          
          print('🎯 ML Model regression tests completed')
          "

  # Data Pipeline Regression Tests  
  data-regression:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pandas numpy
          
      - name: Test data loading and processing
        run: |
          python -c "
          import pandas as pd
          import numpy as np
          import os
          import sys
          
          print('📊 Testing Data Pipeline...')
          
          # Test main data file
          if os.path.exists('data/historial_kabala_github.csv'):
              try:
                  df = pd.read_csv('data/historial_kabala_github.csv')
                  print(f'✓ Main dataset loaded: {df.shape[0]} rows')
                  
                  # Basic data quality checks
                  if df.isnull().sum().sum() > 0:
                      print('⚠ Dataset contains null values')
                  else:
                      print('✓ No null values found')
                      
                  # Check data types
                  numeric_cols = df.select_dtypes(include=[np.number]).columns
                  print(f'✓ Found {len(numeric_cols)} numeric columns')
                  
              except Exception as e:
                  print(f'✗ Main dataset test failed: {e}')
                  sys.exit(1)
          else:
              print('⚠ Main dataset not found')
          
          # Test jackpots data if exists
          if os.path.exists('data/jackpots_omega.csv'):
              try:
                  df = pd.read_csv('data/jackpots_omega.csv')
                  print(f'✓ Jackpots dataset loaded: {df.shape[0]} rows')
              except Exception as e:
                  print(f'⚠ Jackpots dataset test failed: {e}')
          
          print('📈 Data pipeline regression tests completed')
          "

  # Security Regression Tests
  security-regression:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install security testing tools
        run: |
          pip install bandit safety requests
          
      - name: Run security scans
        run: |
          # Bandit security scan
          bandit -r . -f json -o bandit-report.json || true
          
          # Safety check for vulnerable dependencies
          safety check --json --output safety-report.json || true
          
          # Custom security validation
          if [ -f "run_security_validation.py" ]; then
            python run_security_validation.py
          fi
          
      - name: Validate SSL configuration
        run: |
          python -c "
          import os
          import json
          
          print('🔒 Testing Security Configuration...')
          
          # Check SSL certificate files
          ssl_files = ['ssl/cert.pem', 'ssl/key.pem', 'ssl/bundle.pem']
          for ssl_file in ssl_files:
              if os.path.exists(ssl_file):
                  print(f'✓ SSL file found: {ssl_file}')
              else:
                  print(f'⚠ SSL file missing: {ssl_file}')
          
          # Check security configuration
          if os.path.exists('ssl/ssl_config.json'):
              with open('ssl/ssl_config.json', 'r') as f:
                  config = json.load(f)
                  print('✓ SSL configuration loaded')
          
          print('🛡️ Security regression tests completed')
          "
          
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # Performance Regression Tests
  performance-regression:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install performance testing tools
        run: |
          pip install -r requirements.txt
          pip install pytest-benchmark memory-profiler
          
      - name: Run performance regression tests
        run: |
          python -c "
          import time
          import psutil
          import os
          import sys
          
          print('⚡ Running Performance Regression Tests...')
          
          # Memory usage baseline
          process = psutil.Process()
          initial_memory = process.memory_info().rss / 1024 / 1024  # MB
          print(f'Initial memory usage: {initial_memory:.2f} MB')
          
          # Test prediction performance
          start_time = time.time()
          
          # Simulate prediction workload
          try:
              import numpy as np
              test_data = np.random.rand(1000, 50)
              
              # Mock prediction timing
              for i in range(100):
                  _ = np.sum(test_data * np.random.rand(1, 50), axis=1)
              
              end_time = time.time()
              duration = end_time - start_time
              print(f'✓ Prediction performance test: {duration:.2f}s')
              
              # Check if performance is within acceptable range
              if duration > 10:  # 10 seconds threshold
                  print('⚠ Performance test exceeded threshold')
              else:
                  print('✓ Performance within acceptable range')
                  
          except Exception as e:
              print(f'⚠ Performance test failed: {e}')
          
          # Final memory check
          final_memory = process.memory_info().rss / 1024 / 1024  # MB
          memory_increase = final_memory - initial_memory
          print(f'Memory increase: {memory_increase:.2f} MB')
          
          if memory_increase > 500:  # 500MB threshold
              print('⚠ Significant memory increase detected')
          else:
              print('✓ Memory usage within acceptable range')
          
          print('🏁 Performance regression tests completed')
          "

  # Integration Regression Tests
  integration-regression:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run integration regression tests
        run: |
          # Test main.py execution
          timeout 120 python main.py --test-mode --quick-run || echo "Main execution test completed"
          
          # Test comprehensive integration if available
          if [ -f "comprehensive_integration_test_runner.py" ]; then
            timeout 300 python comprehensive_integration_test_runner.py || echo "Integration test completed"
          fi
          
          # Test API integration
          if [ -f "api_integration_test.py" ]; then
            python api_integration_test.py
          fi

  # Report Generation
  generate-regression-report:
    runs-on: ubuntu-latest
    needs: [api-regression, ml-regression, data-regression, security-regression, performance-regression, integration-regression]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate regression test report
        run: |
          echo "# OMEGA Regression Test Report" > regression-report.md
          echo "**Date:** $(date)" >> regression-report.md
          echo "**Commit:** ${{ github.sha }}" >> regression-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> regression-report.md
          echo "" >> regression-report.md
          echo "## Test Results" >> regression-report.md
          
          # Check job results and add to report
          if [ "${{ needs.api-regression.result }}" == "success" ]; then
            echo "- ✅ API Regression Tests: PASSED" >> regression-report.md
          else
            echo "- ❌ API Regression Tests: FAILED" >> regression-report.md
          fi
          
          if [ "${{ needs.ml-regression.result }}" == "success" ]; then
            echo "- ✅ ML Model Regression Tests: PASSED" >> regression-report.md
          else
            echo "- ❌ ML Model Regression Tests: FAILED" >> regression-report.md
          fi
          
          if [ "${{ needs.data-regression.result }}" == "success" ]; then
            echo "- ✅ Data Pipeline Regression Tests: PASSED" >> regression-report.md
          else
            echo "- ❌ Data Pipeline Regression Tests: FAILED" >> regression-report.md
          fi
          
          if [ "${{ needs.security-regression.result }}" == "success" ]; then
            echo "- ✅ Security Regression Tests: PASSED" >> regression-report.md
          else
            echo "- ❌ Security Regression Tests: FAILED" >> regression-report.md
          fi
          
          if [ "${{ needs.performance-regression.result }}" == "success" ]; then
            echo "- ✅ Performance Regression Tests: PASSED" >> regression-report.md
          else
            echo "- ❌ Performance Regression Tests: FAILED" >> regression-report.md
          fi
          
          if [ "${{ needs.integration-regression.result }}" == "success" ]; then
            echo "- ✅ Integration Regression Tests: PASSED" >> regression-report.md
          else
            echo "- ❌ Integration Regression Tests: FAILED" >> regression-report.md
          fi
          
          echo "" >> regression-report.md
          echo "## Summary" >> regression-report.md
          echo "Regression testing completed for OMEGA system components." >> regression-report.md
          
      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-report
          path: regression-report.md
          
      - name: Comment on PR if applicable
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('regression-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Regression Test Results\n\n' + report
            });