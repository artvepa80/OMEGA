name: 🔄 Dependency Updates & Security Checks

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  update-dependencies:
    name: 📦 Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools safety bandit

    - name: Check for outdated packages
      run: |
        pip list --outdated --format=json > outdated-packages.json
        cat outdated-packages.json

    - name: Update requirements
      run: |
        # Backup current requirements
        cp requirements.txt requirements.txt.backup
        
        # Try to update packages safely
        pip-compile --upgrade --resolver=backtracking requirements.in 2>/dev/null || true

    - name: Run security checks on updated packages
      run: |
        safety check --json --output security-report.json || true
        bandit -r . -f json -o bandit-report.json || true

    - name: Create Pull Request
      if: success()
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "🔄 Auto-update dependencies"
        title: "🔄 Automated Dependency Updates"
        body: |
          ## 🔄 Automated Dependency Updates
          
          This PR contains automated dependency updates generated by GitHub Actions.
          
          ### 📋 Changes:
          - Updated Python dependencies to latest compatible versions
          - Security vulnerability checks passed
          - Automated testing will verify compatibility
          
          ### 🔍 Review Required:
          - [ ] Review updated dependencies
          - [ ] Ensure all tests pass
          - [ ] Verify Akash deployment compatibility
          
          ### 📊 Reports:
          Security and compatibility reports are attached as artifacts.
          
          ---
          🤖 *This PR was generated automatically by the dependency update workflow*
        branch: dependency-updates
        delete-branch: true

    - name: Upload reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: dependency-reports
        path: |
          outdated-packages.json
          security-report.json
          bandit-report.json
        retention-days: 30