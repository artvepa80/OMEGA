name: OMEGA CI
on:
  push:
    branches: [ main, 'release/**' ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
      - name: Unit tests
        run: pytest -q

  backtest:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Backtest (corto)
        run: |
          python -m tools.eval_harness.cli backtest \
            --data data/historial_kabala_github_fixed.csv \
            --models hybrid,consensus \
            --windows rolling_200 \
            --top_n 5 --seed 42 \
            --out results/accuracy_analysis/ci_run
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: results/accuracy_analysis/**/report.html


