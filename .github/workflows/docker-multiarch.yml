name: 🚀 OMEGA Multi-Arch Docker Build (GitHub Pro)

on:
  push:
    branches: [main, master, feature/results-integration-20250819]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Tag suffix (e.g., -beta, -test)'
        required: false
        default: ''
      omega_version:
        description: 'OMEGA Version (default: v10.1)'
        required: false
        default: 'v10.1'

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME: omega-ai

jobs:
  build-multiarch:
    name: 🏗️ Multi-Architecture Build
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4 horas max para builds grandes
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Para VCS_REF completo

      - name: 🧹 Maximize Build Space (para >2GB)
        uses: easimon/maximize-build-space@v8
        with:
          root-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'false'  # Mantener para cache

      - name: 📊 Show Available Space
        run: |
          echo "🔍 Available disk space after cleanup:"
          df -h /
          echo "💾 Memory info:"
          free -h
          echo "🐳 Docker info:"
          docker info --format '{{json .}}' | jq '{ServerVersion, Architecture, OSType, MemTotal}'

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
          driver-opts: |
            network=host
          buildkitd-flags: |
            --allow-insecure-entitlement network.host
            --allow-insecure-entitlement security.insecure

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=complete-v10.1,enable={{is_default_branch}}
            type=raw,value=multiarch-latest,enable={{is_default_branch}}
          flavor: |
            suffix=${{ github.event.inputs.tag_suffix || '' }}

      - name: 🔄 Cache Docker Layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: 🚀 Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            OMEGA_VERSION=${{ github.event.inputs.omega_version || 'v10.1' }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}

      - name: 🔄 Move Docker Cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: 🧪 Test Post-Build (AMD64 & ARM64)
        run: |
          for ARCH in amd64 arm64; do
            echo "🧪 Testing OMEGA on linux/$ARCH..."
            docker run --rm --platform linux/$ARCH \
              ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
              bash -c "
                echo '✅ Health check $ARCH:' && 
                python3 -c '
                import sys, os, platform
                sys.path.append(\"/app\")
                print(\"✅ Python:\", sys.version.split()[0])
                print(\"✅ Platform:\", platform.machine())
                print(\"✅ OMEGA files:\", len([f for f in os.listdir(\"/app\") if f.endswith(\".py\")]))
                print(\"✅ Core exists:\", os.path.exists(\"core\"))
                print(\"✅ Modules exists:\", os.path.exists(\"modules\"))
                try:
                    import torch, tensorflow as tf
                    print(\"✅ PyTorch:\", torch.__version__)
                    print(\"✅ TensorFlow:\", tf.__version__)
                except ImportError as e:
                    print(\"⚠️  ML libraries:\", str(e))
                try:
                    import core.predictor
                    print(\"✅ Core predictor imported\")
                except ImportError as e:
                    print(\"⚠️  Core predictor:\", str(e))
                ' && 
                echo '📊 Entrypoint test:' && 
                ./entrypoint.sh echo 'Test passed on $ARCH'
              "
          done

      - name: 🔍 Inspect Multi-Arch Manifest
        run: |
          echo "🔍 Inspecting multi-arch manifest..."
          docker buildx imagetools inspect ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: 📋 Build Summary
        run: |
          echo "## 🎉 OMEGA Multi-Arch Build Completed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏷️ Built Images:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏗️ Supported Architectures:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ linux/amd64 (Intel/AMD)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ linux/arm64 (Apple Silicon/ARM)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Ready for Akash Deployment!" >> $GITHUB_STEP_SUMMARY
          echo "Images are optimized multi-stage builds containing the complete OMEGA PRO AI v10.1 system." >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-multiarch
    if: github.event_name != 'pull_request'

    steps:
      - name: 🔍 Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📋 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'