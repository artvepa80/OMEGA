profiles:
  compute:
    omega-shell:
      resources:
        cpu:
          units: 2.0
        memory:
          size: 4Gi
        storage:
          size: 20Gi
  placement:
    dcloud:
      pricing:
        omega-shell:
          denom: uakt
          amount: 15000

deployment:
  omega-shell:
    dcloud:
      profile: omega-shell
      count: 1