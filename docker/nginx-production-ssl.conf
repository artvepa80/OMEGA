# Production Nginx SSL Configuration for OMEGA Pro AI
# Optimized for Let's Encrypt certificates with enterprise security
user omega;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
    worker_rlimit_nofile 8192;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    client_max_body_size 64M;
    server_tokens off;  # Hide nginx version

    # MIME Types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Configuration with Enhanced Security Monitoring
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'ssl_protocol=$ssl_protocol ssl_cipher=$ssl_cipher '
                   'ssl_session_reused=$ssl_session_reused';

    log_format security '$remote_addr - [$time_local] "$request" '
                       '$status "$http_user_agent" ssl_protocol=$ssl_protocol '
                       'ssl_cipher=$ssl_cipher ssl_verify_result=$ssl_client_verify';

    access_log /app/logs/nginx_access.log main;
    error_log /app/logs/nginx_error.log warn;
    access_log /app/logs/nginx_security.log security;

    # Production SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256';
    
    # Enhanced SSL Session Configuration
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling with Let's Encrypt
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_stapling_file /app/ssl/ocsp_response;
    ssl_trusted_certificate /app/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Enhanced Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self' https:; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Certificate-Fingerprint $ssl_client_fingerprint always;

    # Rate Limiting with Enhanced Protection
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ssl_limit:10m rate=10r/s;

    # Connection Limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    limit_conn conn_limit_per_ip 20;

    # Gzip Configuration
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Map for real IP detection
    map $http_x_forwarded_for $real_ip {
        ~^(\d+\.\d+\.\d+\.\d+) $1;
        default $remote_addr;
    }

    # HTTP to HTTPS Redirect
    server {
        listen 80;
        server_name _;
        
        # Let's Encrypt ACME Challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
        
        # Health check endpoint (allow HTTP)
        location /health {
            proxy_pass http://127.0.0.1:8000/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
        }
        
        # Redirect all other HTTP requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server Configuration with Production Certificates
    server {
        listen 443 ssl http2;
        server_name omega-api.akash.network a17d0f2p7pbkp4bc0pjgbsmp8o.ingress.paradigmapolitico.online;

        # Production SSL Certificate Configuration
        ssl_certificate /app/ssl/cert.pem;
        ssl_certificate_key /app/ssl/key.pem;
        ssl_dhparam /app/ssl/dhparam.pem;

        # SSL Client Certificate Verification (Optional)
        # ssl_client_certificate /app/ssl/ca-cert.pem;
        # ssl_verify_client optional;

        # Root and Index
        root /app/static;
        index index.html;

        # Certificate Information Headers
        add_header X-SSL-Protocol $ssl_protocol always;
        add_header X-SSL-Cipher $ssl_cipher always;
        add_header X-SSL-Session-Reused $ssl_session_reused always;

        # API Endpoints with Enhanced Rate Limiting
        location /api/ {
            limit_req zone=api_limit burst=100 nodelay;
            
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
            proxy_set_header X-SSL-Client-Fingerprint $ssl_client_fingerprint;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            
            # Enhanced Timeout Configuration
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer Configuration
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # Authentication Endpoints (Enhanced Security)
        location ~ ^/api/(auth|login|register) {
            limit_req zone=auth_limit burst=10 nodelay;
            
            # Additional security headers for auth endpoints
            add_header X-Frame-Options DENY always;
            add_header X-Content-Type-Options nosniff always;
            
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSL-Client-Fingerprint $ssl_client_fingerprint;
        }

        # GPU Service Internal Communication (Enhanced Security)
        location /gpu/ {
            # Restrict to internal networks and Akash
            allow 127.0.0.0/8;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 143.198.0.0/16;  # Akash Network IP ranges
            deny all;
            
            proxy_pass http://127.0.0.1:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Extended timeouts for GPU processing
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # WebSocket Support with SSL
        location /ws/ {
            limit_req zone=general_limit burst=50 nodelay;
            
            proxy_pass http://127.0.0.1:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
            
            # WebSocket timeout
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health Check and Monitoring Endpoints
        location ~ ^/(health|metrics|status) {
            proxy_pass http://127.0.0.1:8000$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            
            # Quick health check timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
            
            # Allow health checks from monitoring systems
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            # Add your monitoring IPs here
        }

        # SSL Certificate Information Endpoint
        location /ssl/info {
            limit_req zone=ssl_limit burst=5 nodelay;
            
            default_type application/json;
            return 200 '{
                "ssl_protocol": "$ssl_protocol",
                "ssl_cipher": "$ssl_cipher",
                "ssl_session_reused": "$ssl_session_reused",
                "ssl_server_name": "$ssl_server_name",
                "ssl_certificate_fingerprint": "$ssl_client_fingerprint"
            }';
        }

        # Certificate files (protected)
        location ~ ^/ssl/(cert\.pem|bundle\.pem)$ {
            limit_req zone=ssl_limit burst=2 nodelay;
            
            # Only allow from internal networks
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            
            alias /app/ssl/$1;
            expires 1d;
            add_header Cache-Control "private, no-cache";
        }

        # Static Files with Long Caching
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri $uri/ =404;
        }

        # Favicon with Caching
        location = /favicon.ico {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files /favicon.ico =404;
        }

        # Security: Deny access to sensitive files
        location ~ /\.(ht|env|git) {
            deny all;
            return 404;
        }

        location ~ \.(log|conf|ini|bak|backup)$ {
            deny all;
            return 404;
        }

        # Prevent access to certificate private keys
        location ~ \.key$ {
            deny all;
            return 404;
        }

        # Default location with rate limiting
        location / {
            limit_req zone=general_limit burst=200 nodelay;
            
            try_files $uri $uri/ @api;
        }

        # Fallback to API
        location @api {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSL-Client-Cert $ssl_client_cert;
        }

        # Enhanced Error Pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        error_page 495 496 497 /ssl_error.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /ssl_error.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Upstream health monitoring
    upstream backend {
        server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream gpu_backend {
        server 127.0.0.1:8001 max_fails=2 fail_timeout=60s;
        keepalive 16;
    }
}