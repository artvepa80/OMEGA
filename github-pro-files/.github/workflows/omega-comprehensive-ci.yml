name: 🚀 OMEGA Comprehensive CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOCKER_REGISTRY: artvepa80
  AKASH_DEPLOYMENT_URL: https://f4o5gi3c0tfmvblt4avi2l6o08.ingress.akash.win

jobs:
  # Code Quality and Testing
  test-and-lint:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov safety bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
      
      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat warnings as non-blocking
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Security scan with bandit
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . || true
      
      - name: Check dependencies for vulnerabilities
        run: |
          safety check || true
      
      - name: Test with pytest
        run: |
          if [ -d "tests/" ]; then
            pytest tests/ --cov=. --cov-report=xml --cov-report=html
          else
            echo "⚠️ No tests directory found, running basic import test"
            python -c "
            import sys
            sys.path.append('.')
            try:
                import main
                print('✅ Main module imports successfully')
            except Exception as e:
                print(f'⚠️ Import test failed: {e}')
            "
          fi
      
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
            bandit-report.json
          retention-days: 30

  # Build Docker Images
  build-images:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.event_name == 'push' || github.event.inputs.environment
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REGISTRY }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
        continue-on-error: true
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/omega-pro-ai
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push main API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push GPU image
        if: hashFiles('Dockerfile.gpu') != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/omega-pro-ai:gpu-${{ github.sha }}, ${{ env.DOCKER_REGISTRY }}/omega-pro-ai:gpu-latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Akash Network
  deploy-akash:
    name: 🚀 Deploy to Akash Network
    runs-on: ubuntu-latest
    needs: [test-and-lint, build-images]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup deployment environment
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'staging' }}"
          echo "DEPLOYMENT_ENV=$ENVIRONMENT" >> $GITHUB_ENV
          echo "DEPLOYMENT_TAG=sha-${{ github.sha }}" >> $GITHUB_ENV
      
      - name: Prepare Akash deployment configuration
        run: |
          if [ -f "deploy/akash-deployment.yaml" ]; then
            cp deploy/akash-deployment.yaml deploy/akash-deployment-current.yaml
          else
            echo "⚠️ Creating basic Akash deployment configuration"
            mkdir -p deploy
            cat > deploy/akash-deployment-current.yaml << 'EOF'
          ---
          version: "2.0"
          
          services:
            omega-api:
              image: artvepa80/omega-pro-ai:sha-${{ github.sha }}
              expose:
                - port: 8000
                  as: 80
                  to:
                    - global: true
              env:
                - PYTHONPATH=/app
                - PORT=8000
          
          profiles:
            compute:
              omega-api:
                resources:
                  cpu:
                    units: 2
                  memory:
                    size: 4Gi
                  storage:
                    size: 10Gi
            placement:
              akash:
                pricing:
                  omega-api:
                    denom: uakt
                    amount: 1000
          
          deployment:
            omega-api:
              akash:
                profile: omega-api
                count: 1
          EOF
          fi
          
          # Update image tag in deployment
          sed -i "s|artvepa80/omega-pro-ai:.*|artvepa80/omega-pro-ai:sha-${{ github.sha }}|g" deploy/akash-deployment-current.yaml
      
      - name: Validate deployment configuration
        run: |
          echo "🔍 Validating deployment configuration..."
          cat deploy/akash-deployment-current.yaml
          
          # Basic YAML validation
          python -c "
          import yaml
          try:
              with open('deploy/akash-deployment-current.yaml') as f:
                  yaml.safe_load(f)
              print('✅ Deployment configuration is valid YAML')
          except Exception as e:
              print(f'❌ Invalid YAML: {e}')
              exit(1)
          "
      
      - name: Simulate Akash deployment
        run: |
          echo "🚀 Simulating Akash Network deployment..."
          echo "Environment: ${{ env.DEPLOYMENT_ENV }}"
          echo "Image: artvepa80/omega-pro-ai:sha-${{ github.sha }}"
          echo "Deployment URL: ${{ env.AKASH_DEPLOYMENT_URL }}"
          
          # In a real deployment, this would use the Akash CLI:
          # akash tx deployment create deploy/akash-deployment-current.yaml
          
          echo "✅ Deployment simulation completed"
      
      - name: Health check deployment
        run: |
          echo "🏥 Performing health checks..."
          
          # Wait for deployment to be ready (simulation)
          sleep 30
          
          # Health check the actual Akash deployment
          HEALTH_URL="${{ env.AKASH_DEPLOYMENT_URL }}/health"
          
          for i in {1..10}; do
            echo "Health check attempt $i/10..."
            if curl -f -s "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed"
              break
            elif [ $i -eq 10 ]; then
              echo "❌ Health check failed after 10 attempts"
              exit 1
            else
              echo "⏳ Waiting 30 seconds before retry..."
              sleep 30
            fi
          done
      
      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akash-deployment-${{ github.sha }}
          path: |
            deploy/akash-deployment-current.yaml
          retention-days: 30

  # Post-deployment verification
  verify-deployment:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy-akash
    if: success()
    
    steps:
      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke tests against deployed service..."
          
          API_URL="${{ env.AKASH_DEPLOYMENT_URL }}"
          
          # Test health endpoint
          echo "Testing health endpoint..."
          curl -f "$API_URL/health" || exit 1
          
          # Test prediction endpoint (if exists)
          echo "Testing prediction endpoint..."
          curl -f -X POST "$API_URL/predict" -H "Content-Type: application/json" -d '{"test": true}' || echo "⚠️ Prediction endpoint test failed"
          
          echo "✅ Smoke tests completed"
      
      - name: Performance baseline test
        run: |
          echo "📊 Running performance baseline test..."
          
          # Simple load test
          for i in {1..10}; do
            start_time=$(date +%s%N)
            curl -s "${{ env.AKASH_DEPLOYMENT_URL }}/health" > /dev/null
            end_time=$(date +%s%N)
            response_time=$(( (end_time - start_time) / 1000000 ))
            echo "Request $i: ${response_time}ms"
          done
          
          echo "✅ Performance baseline test completed"

  # Notification and reporting
  notify-completion:
    name: 📢 Notify Completion
    runs-on: ubuntu-latest
    needs: [test-and-lint, build-images, deploy-akash, verify-deployment]
    if: always()
    
    steps:
      - name: Deployment summary
        run: |
          echo "# 🚀 OMEGA CI/CD Pipeline Summary" > deployment-summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> deployment-summary.md
          echo "**Commit:** ${{ github.sha }}" >> deployment-summary.md
          echo "**Environment:** ${{ github.event.inputs.environment || 'staging' }}" >> deployment-summary.md
          echo "**Date:** $(date)" >> deployment-summary.md
          echo "" >> deployment-summary.md
          
          echo "## Job Results" >> deployment-summary.md
          echo "- **Tests & Linting:** ${{ needs.test-and-lint.result }}" >> deployment-summary.md
          echo "- **Docker Build:** ${{ needs.build-images.result }}" >> deployment-summary.md
          echo "- **Akash Deployment:** ${{ needs.deploy-akash.result }}" >> deployment-summary.md
          echo "- **Verification:** ${{ needs.verify-deployment.result }}" >> deployment-summary.md
          echo "" >> deployment-summary.md
          
          if [ "${{ needs.deploy-akash.result }}" == "success" ]; then
            echo "✅ **Status:** Deployment Successful" >> deployment-summary.md
            echo "🌐 **Live URL:** ${{ env.AKASH_DEPLOYMENT_URL }}" >> deployment-summary.md
          else
            echo "❌ **Status:** Deployment Failed" >> deployment-summary.md
          fi
          
          cat deployment-summary.md
      
      - name: Upload deployment summary
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary
          path: deployment-summary.md