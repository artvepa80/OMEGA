name: Build OMEGA Multi-Arch Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: omega-pro-ai

jobs:
  build:
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 120
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@v8
      with:
        root-reserve-mb: 512
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Checkout OMEGA repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:latest
          network=host
        config-inline: |
          [worker.oci]
            max-parallelism = 4
          [worker.containerd]
            max-parallelism = 4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=v10.1-multiarch
          type=sha,prefix={{branch}}-

    - name: Build and push OMEGA Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=omega-buildkit
        cache-to: type=gha,scope=omega-buildkit,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
          OMEGA_VERSION=v10.1
        secrets: |
          "github_token=${{ secrets.GITHUB_TOKEN }}"

    - name: Test OMEGA image
      run: |
        echo "Testing OMEGA container..."
        docker run --rm --platform linux/amd64 \
          ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
          python3 -c "print('OMEGA v10.1 container working!')"

    - name: Generate OMEGA Akash deployment
      run: |
        cat > omega-github-multiarch.yaml << 'EOF'
        version: "2.0"
        
        services:
          omegaproaiv101:
            image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            command:
              - "bash"
              - "-c"
              - "cd /app && python3 main.py --server-mode --port 8000"
            expose:
              - port: 8000
                as: 80
                to:
                  - global: true
            env:
              - OMEGA_ENV=production
              - OMEGA_VERSION=v10.1-github
              - REAL_ALGORITHMS=true
              - PYTHONPATH=/app
              - CPU_CORES=8
              - MEMORY_LIMIT=17GB
            resources:
              cpu:
                units: "8.0"
              memory:
                size: 17Gi
              storage:
                - size: 107Gi
        
        profiles:
          compute:
            omegaproaiv101:
              resources:
                cpu:
                  units: "8.0"
                memory:
                  size: 17Gi
                storage:
                  - size: 107Gi
        
          placement:
            dcloud:
              pricing:
                omegaproaiv101:
                  denom: uakt
                  amount: 300
        
        deployment:
          omegaproaiv101:
            dcloud:
              profile: omegaproaiv101
              count: 1
        EOF

    - name: Upload Akash deployment file
      uses: actions/upload-artifact@v4
      with:
        name: omega-akash-deployment
        path: omega-github-multiarch.yaml
        
    - name: Clean up old images
      uses: actions/delete-package-versions@v4
      with:
        package-name: ${{ env.IMAGE_NAME }}
        package-type: 'container'
        min-versions-to-keep: 3
        delete-only-untagged-versions: true