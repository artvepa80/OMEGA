[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
buildCommand = "echo 'Building OMEGA PRO AI v10.1 for Railway...'"

[deploy]
startCommand = "/app/start_production.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

[env]
# Environment variables for Railway deployment
ENVIRONMENT = "production"
DEBUG = "false"
WORKERS = "2"
PYTHONUNBUFFERED = "1"
TZ = "UTC"
PORT = "8000"

# Security settings for Railway
RAILWAY_ENVIRONMENT_NAME = "production"
VERIFY_SIGNATURE = "true"
API_KEY_REQUIRED = "true"

# Performance optimization
MAX_WORKERS = "4"
REQUEST_TIMEOUT = "300"
KEEP_ALIVE = "5"

# Features for Railway
ENABLE_METRICS = "true"
ENABLE_HEALTH_CHECKS = "true"
ENABLE_RATE_LIMITING = "true"

[regions]
# Multi-region deployment configuration
primary = "us-west1"
fallback = ["us-east1", "eu-west1"]

[scaling]
# Auto-scaling configuration
autoscaling = true
minReplicas = 1
maxReplicas = 3
targetCPU = 70
targetMemory = 80

[monitoring]
# Health check and monitoring settings
healthcheck.enabled = true
healthcheck.path = "/health"
healthcheck.interval = "30s"
healthcheck.timeout = "10s"
healthcheck.retries = 3

# Metrics collection
metrics.enabled = true
metrics.path = "/metrics"

# Logging configuration
logs.enabled = true
logs.level = "INFO"
logs.format = "json"

[resources]
# Resource allocation
cpu = "1000m"  # 1 vCPU
memory = "2Gi"  # 2GB RAM
storage = "10Gi"  # 10GB storage

# Resource limits
limits.cpu = "2000m"  # 2 vCPU max
limits.memory = "4Gi"  # 4GB RAM max

# Update timestamp for deployment tracking
updatedAt = "2025-08-15T20:00:00Z"
