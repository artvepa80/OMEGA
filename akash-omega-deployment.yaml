---
version: "2.0"

services:
  omega-ai:
    # Use Python image optimized for ML workloads
    image: python:3.11-slim
    command:
      - "bash"
      - "-c"
      - |
        echo "🚀 OMEGA PRO AI v10.1 - Akash Network Deployment"
        echo "💻 Resources: 8 CPU cores, 17GB RAM, 107GB Storage"
        echo "📦 Installing system dependencies..."
        
        apt-get update && apt-get install -y \
          curl git wget build-essential \
          python3-dev libffi-dev libssl-dev \
          htop nano vim tmux && \
        
        echo "📥 Cloning OMEGA from GitHub..."
        git clone https://github.com/artvepa80/OMEGA.git /app && \
        cd /app && \
        
        echo "🐍 Installing Python dependencies..."
        pip install --no-cache-dir --upgrade pip && \
        pip install --no-cache-dir -r requirements.txt && \
        
        echo "🔧 Setting up OMEGA environment..."
        export OMEGA_VERSION=v10.1
        export OMEGA_COMPLETE=true
        export PYTHONUNBUFFERED=1
        export PYTHONPATH=/app
        export AKASH_DEPLOYMENT=true
        
        echo "✅ OMEGA System Ready!" 
        echo "🌐 Starting OMEGA Server on port 8000..."
        echo "🔗 Access your OMEGA system at: http://your-akash-url/"
        
        # Start OMEGA server
        python3 omega_server.py
        
    env:
      - "OMEGA_VERSION=v10.1"
      - "OMEGA_COMPLETE=true"
      - "PYTHONUNBUFFERED=1"
      - "PYTHONPATH=/app"
      - "PORT=8000"
      - "AKASH_DEPLOYMENT=true"
      - "PUID=1000"
      - "PGID=1000"
      - "PASSWORD=omega-secure-2025"
      - "SUDO_PASSWORD=omega-admin-2025"
      
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
        accept:
          - "omega-ai.akash.pro"
          - "*.akash.pro"
          
profiles:
  compute:
    omega-ai:
      resources:
        cpu:
          units: 8000m  # 8 full CPU cores (your available resources)
        memory:
          size: 17Gi    # 17GB RAM (your available resources)
        storage:
          - size: 107Gi # 107GB storage (your available resources)
            name: omega-data
  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - "akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63"
      pricing:
        omega-ai: 
          denom: uakt
          amount: 1000000  # Adjusted for your resource usage

deployment:
  omega-ai:
    akash:
      profile: omega-ai
      count: 1