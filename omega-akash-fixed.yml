version: "2.0"
services:
  omega-fresh:
    image: python:3.11-slim
    expose:
      - port: 4000
        as: 80
        to:
          - global: true
    command:
      - bash
      - -c
      - >
        apt-get update && apt-get install -y git git-lfs openssh-client &&
        mkdir -p ~/.ssh &&
        echo "-----BEGIN OPENSSH PRIVATE KEY-----" > ~/.ssh/key &&
        echo "b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW" >> ~/.ssh/key &&
        echo "QyNTUxOQAAACClTkva2j6yj9w4l8pbtbTMNjW0qLzwC1oxF1dYCaf9GQAAAJjFc5ybxXOc" >> ~/.ssh/key &&
        echo "mwAAAAtzc2gtZWQyNTUxOQAAACClTkva2j6yj9w4l8pbtbTMNjW0qLzwC1oxF1dYCaf9GQ" >> ~/.ssh/key &&
        echo "AAAEA8i7pktcKKYnYf/EDnz/ulZjpC8KhtbO7YLFJinVy00qVOS9ranrKP3DiXylu1tMw2" >> ~/.ssh/key &&
        echo "NbSovPALWjEXV1gJp/0ZAAAAEm9tZWdhLWFrYXNoLWRlcGxveQECAw==" >> ~/.ssh/key &&
        echo "🔄 Cloning with optimizations..." &&
        git config --global http.postBuffer 524288000 &&
        git config --global http.maxRequestBuffer 100M &&
        git config --global core.compression 0 &&
        timeout 1200 git clone --depth 1 --single-branch https://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@github.com/artvepa80/OMEGA.git /app &&
        echo "Repo cloned - recovering from LFS error" &&
        cd /app && 
        git restore --source=HEAD :/ || echo "Repository restored" &&
        echo "✅ OMEGA code ready - continuing without problematic LFS file" &&
        cd /app &&
        echo "🔧 Fixing dependency conflicts..." &&
        sed -i '/safety/d' requirements.txt &&
        echo "📦 Installing dependencies without conflicts..." &&
        pip install --no-cache-dir -r requirements.txt &&
        echo "🚀 Starting OMEGA PRO AI v10.1" &&
        ls -la &&
        echo "🔍 Looking for main OMEGA files..." &&
        find . -name "*.py" -type f | head -10 &&
        echo "🔥 Installing additional dependencies..." &&
        pip install --no-cache-dir flask uvicorn fastapi anthropic openai &&
        echo "🎯 Starting OMEGA UNIFIED SYSTEM..." &&
        echo "🔍 Available files:" && ls -la *.py | head -5 &&
        echo "🚀 Launching OMEGA API Server..." &&
        python3 omega_unified_main.py --mode api --port 4000 --host 0.0.0.0 --cantidad 30

    env:
      - "OMEGA_VERSION=v10.1"
      - "PYTHONUNBUFFERED=1"
      - "PORT=4000"
      - "HOST=0.0.0.0"
      - "ANTHROPIC_API_KEY=YOUR_API_KEY_HERE"
      - "OPENAI_API_KEY=YOUR_OPENAI_KEY_HERE"
      - "OMP_NUM_THREADS=16"
      - "SERVER_MODE=http"
      - "ENABLE_API=true"

profiles:
  compute:
    omega-fresh:
      resources:
        cpu:
          units: 32
        memory:
          size: 35Gi
        storage:
          - size: 215Gi
  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - "akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63"
      pricing:
        omega-fresh:
          denom: uakt
          amount: 1200

deployment:
  omega-fresh:
    akash:
      profile: omega-fresh
      count: 1