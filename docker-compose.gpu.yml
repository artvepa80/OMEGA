version: '3.8'

services:
  omega-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: omega-pro-gpu
    restart: unless-stopped
    
    # GPU configuration
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # Environment variables
    environment:
      - OMEGA_ENV=production
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - REDIS_URL=redis://redis:6379
      - GPU_MEMORY_STRATEGY=balanced
      - ENABLE_GPU_MONITORING=true
      - LOG_LEVEL=INFO
    
    # Ports
    ports:
      - "8000:8000"    # API
      - "8080:8080"    # Monitoring dashboard
    
    # Volumes
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:rw
      - ./logs:/app/logs:rw
      - ./config:/app/config:ro
      - gpu_cache:/app/cache
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Dependencies
    depends_on:
      - redis
      - prometheus
    
    # Resource limits
    mem_limit: 8g
    cpus: 4.0
    
    # Security
    user: "1000:1000"
    read_only: false
    
    # Networks
    networks:
      - omega-network

  redis:
    image: redis:7-alpine
    container_name: omega-redis
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    # Redis configuration
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    
    networks:
      - omega-network

  prometheus:
    image: prom/prometheus:v2.40.0
    container_name: omega-prometheus
    restart: unless-stopped
    
    ports:
      - "9090:9090"
    
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    
    networks:
      - omega-network

  grafana:
    image: grafana/grafana:9.3.0
    container_name: omega-grafana
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=omega123
      - GF_USERS_ALLOW_SIGN_UP=false
    
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    
    networks:
      - omega-network

  # NVIDIA GPU monitoring
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.1.8-3.1.5-ubuntu20.04
    container_name: omega-dcgm-exporter
    restart: unless-stopped
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    ports:
      - "9400:9400"
    
    cap_add:
      - SYS_ADMIN
    
    networks:
      - omega-network

volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  gpu_cache:
    driver: local

networks:
  omega-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16