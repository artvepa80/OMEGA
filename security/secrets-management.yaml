# OMEGA PRO AI v10.1 - Secrets Management Configuration
# Comprehensive secrets management with Kubernetes secrets, HashiCorp Vault integration
# and encrypted environment variables for production security

apiVersion: v1
kind: ConfigMap
metadata:
  name: omega-secrets-management
  namespace: omega-production
  labels:
    app: omega-pro-ai
    component: secrets-management
    version: "10.1"
data:
  # ===== KUBERNETES SECRETS CONFIGURATION =====
  kubernetes-secrets.yaml: |
    # Database credentials
    apiVersion: v1
    kind: Secret
    metadata:
      name: omega-database-credentials
      namespace: omega-production
    type: Opaque
    data:
      # Base64 encoded values - replace with actual values
      DATABASE_URL: <base64_encoded_db_url>
      POSTGRES_USER: <base64_encoded_user>
      POSTGRES_PASSWORD: <base64_encoded_password>
      REDIS_PASSWORD: <base64_encoded_redis_password>
    
    ---
    # API Keys and JWT secrets
    apiVersion: v1
    kind: Secret
    metadata:
      name: omega-api-secrets
      namespace: omega-production
    type: Opaque
    data:
      JWT_SECRET_KEY: <base64_encoded_jwt_secret>
      API_KEY: <base64_encoded_api_key>
      ENCRYPTION_KEY: <base64_encoded_encryption_key>
      SESSION_SECRET: <base64_encoded_session_secret>
    
    ---
    # External service credentials
    apiVersion: v1
    kind: Secret
    metadata:
      name: omega-external-services
      namespace: omega-production
    type: Opaque
    data:
      TWILIO_ACCOUNT_SID: <base64_encoded_twilio_sid>
      TWILIO_AUTH_TOKEN: <base64_encoded_twilio_token>
      WHATSAPP_TOKEN: <base64_encoded_whatsapp_token>
      OPENAI_API_KEY: <base64_encoded_openai_key>
      WEBHOOK_SECRET: <base64_encoded_webhook_secret>
    
    ---
    # SSL/TLS certificates
    apiVersion: v1
    kind: Secret
    metadata:
      name: omega-ssl-certificates
      namespace: omega-production
    type: kubernetes.io/tls
    data:
      tls.crt: <base64_encoded_certificate>
      tls.key: <base64_encoded_private_key>
      ca.crt: <base64_encoded_ca_certificate>

  # ===== HASHICORP VAULT CONFIGURATION =====
  vault-config.hcl: |
    # HashiCorp Vault configuration for OMEGA PRO AI
    
    # Storage backend
    storage "consul" {
      address = "127.0.0.1:8500"
      path    = "vault/"
    }
    
    # Listener
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_cert_file = "/etc/vault/ssl/cert.pem"
      tls_key_file  = "/etc/vault/ssl/key.pem"
      tls_disable   = false
    }
    
    # API and cluster addresses
    api_addr = "https://vault.omega-ai.internal:8200"
    cluster_addr = "https://vault.omega-ai.internal:8201"
    
    # Enable UI
    ui = true
    
    # Seal configuration (auto-unseal with cloud KMS)
    seal "awskms" {
      region     = "us-west-2"
      kms_key_id = "omega-vault-seal-key"
    }
    
    # Logging
    log_level = "INFO"
    log_file  = "/var/log/vault/vault.log"

  # ===== VAULT POLICIES =====
  vault-policies.hcl: |
    # OMEGA API service policy
    path "secret/data/omega/api/*" {
      capabilities = ["read"]
    }
    
    path "secret/data/omega/database/*" {
      capabilities = ["read"]
    }
    
    path "auth/token/lookup-self" {
      capabilities = ["read"]
    }
    
    path "auth/token/renew-self" {
      capabilities = ["update"]
    }
    
    # OMEGA GPU service policy
    path "secret/data/omega/gpu/*" {
      capabilities = ["read"]
    }
    
    path "secret/data/omega/ml/*" {
      capabilities = ["read", "list"]
    }
    
    # Admin policy
    path "secret/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    
    path "sys/policy/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }
    
    path "auth/*" {
      capabilities = ["create", "read", "update", "delete", "list"]
    }

  # ===== VAULT AGENT CONFIGURATION =====
  vault-agent.hcl: |
    # Vault Agent configuration for OMEGA services
    
    pid_file = "/tmp/pidfile"
    
    vault {
      address = "https://vault.omega-ai.internal:8200"
      tls_skip_verify = false
    }
    
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "omega-api"
        }
      }
      
      sink "file" {
        config = {
          path = "/tmp/vault-token"
        }
      }
    }
    
    template {
      source      = "/etc/vault/templates/database.tpl"
      destination = "/etc/omega/secrets/database.env"
      perms       = 0600
      command     = "systemctl reload omega-api"
    }
    
    template {
      source      = "/etc/vault/templates/api-keys.tpl"
      destination = "/etc/omega/secrets/api-keys.env"
      perms       = 0600
      command     = "systemctl reload omega-api"
    }

  # ===== SECRET TEMPLATES =====
  database-template.tpl: |
    # Database configuration template
    DATABASE_URL="{{ with secret "secret/data/omega/database" }}{{ .Data.data.url }}{{ end }}"
    POSTGRES_USER="{{ with secret "secret/data/omega/database" }}{{ .Data.data.username }}{{ end }}"
    POSTGRES_PASSWORD="{{ with secret "secret/data/omega/database" }}{{ .Data.data.password }}{{ end }}"
    REDIS_URL="{{ with secret "secret/data/omega/redis" }}{{ .Data.data.url }}{{ end }}"
    REDIS_PASSWORD="{{ with secret "secret/data/omega/redis" }}{{ .Data.data.password }}{{ end }}"

  api-keys-template.tpl: |
    # API keys configuration template
    JWT_SECRET_KEY="{{ with secret "secret/data/omega/api" }}{{ .Data.data.jwt_secret }}{{ end }}"
    API_KEY="{{ with secret "secret/data/omega/api" }}{{ .Data.data.api_key }}{{ end }}"
    ENCRYPTION_KEY="{{ with secret "secret/data/omega/api" }}{{ .Data.data.encryption_key }}{{ end }}"
    SESSION_SECRET="{{ with secret "secret/data/omega/api" }}{{ .Data.data.session_secret }}{{ end }}"
    TWILIO_ACCOUNT_SID="{{ with secret "secret/data/omega/external" }}{{ .Data.data.twilio_sid }}{{ end }}"
    TWILIO_AUTH_TOKEN="{{ with secret "secret/data/omega/external" }}{{ .Data.data.twilio_token }}{{ end }}"

  # ===== ENCRYPTION CONFIGURATION =====
  encryption-config.yaml: |
    # Encryption at rest configuration
    apiVersion: apiserver.config.k8s.io/v1
    kind: EncryptionConfiguration
    resources:
      - resources:
          - secrets
        providers:
          - aescbc:
              keys:
                - name: key1
                  secret: <base64_encoded_32_byte_key>
          - identity: {}

  # ===== SECRETS ROTATION SCRIPT =====
  rotate-secrets.sh: |
    #!/bin/bash
    # Automated secrets rotation script
    set -euo pipefail
    
    VAULT_ADDR="https://vault.omega-ai.internal:8200"
    NAMESPACE="omega-production"
    
    # Function to generate secure random password
    generate_password() {
        openssl rand -base64 32 | tr -d "=+/" | cut -c1-25
    }
    
    # Function to generate JWT secret
    generate_jwt_secret() {
        openssl rand -base64 64 | tr -d "=+/" | cut -c1-64
    }
    
    # Function to generate encryption key
    generate_encryption_key() {
        openssl rand -base64 32
    }
    
    echo "🔄 Starting secrets rotation..."
    
    # Authenticate with Vault
    vault auth -method=kubernetes role=omega-admin
    
    # Rotate database password
    NEW_DB_PASSWORD=$(generate_password)
    vault kv put secret/omega/database password="$NEW_DB_PASSWORD"
    
    # Rotate Redis password
    NEW_REDIS_PASSWORD=$(generate_password)
    vault kv put secret/omega/redis password="$NEW_REDIS_PASSWORD"
    
    # Rotate JWT secret
    NEW_JWT_SECRET=$(generate_jwt_secret)
    vault kv put secret/omega/api jwt_secret="$NEW_JWT_SECRET"
    
    # Rotate encryption key
    NEW_ENCRYPTION_KEY=$(generate_encryption_key)
    vault kv put secret/omega/api encryption_key="$NEW_ENCRYPTION_KEY"
    
    # Update Kubernetes secrets
    kubectl create secret generic omega-database-credentials \
        --from-literal=POSTGRES_PASSWORD="$NEW_DB_PASSWORD" \
        --from-literal=REDIS_PASSWORD="$NEW_REDIS_PASSWORD" \
        --namespace="$NAMESPACE" \
        --dry-run=client -o yaml | kubectl apply -f -
    
    kubectl create secret generic omega-api-secrets \
        --from-literal=JWT_SECRET_KEY="$NEW_JWT_SECRET" \
        --from-literal=ENCRYPTION_KEY="$NEW_ENCRYPTION_KEY" \
        --namespace="$NAMESPACE" \
        --dry-run=client -o yaml | kubectl apply -f -
    
    # Restart services to pick up new secrets
    kubectl rollout restart deployment/omega-api -n "$NAMESPACE"
    kubectl rollout restart deployment/omega-gpu -n "$NAMESPACE"
    
    echo "✅ Secrets rotation completed successfully"
    
    # Log rotation event
    echo "$(date -u): Secrets rotated successfully" >> /var/log/omega/secrets-rotation.log

  # ===== SECRETS BACKUP SCRIPT =====
  backup-secrets.sh: |
    #!/bin/bash
    # Encrypted secrets backup script
    set -euo pipefail
    
    BACKUP_DIR="/var/backups/omega-secrets"
    ENCRYPTION_KEY_FILE="/etc/omega/backup-encryption.key"
    DATE=$(date +%Y%m%d_%H%M%S)
    NAMESPACE="omega-production"
    
    # Create backup directory
    mkdir -p "$BACKUP_DIR"
    
    echo "🔐 Starting encrypted secrets backup..."
    
    # Export Vault secrets
    vault kv get -format=json secret/omega > "$BACKUP_DIR/vault-secrets-$DATE.json"
    
    # Export Kubernetes secrets
    kubectl get secrets -n "$NAMESPACE" -o yaml > "$BACKUP_DIR/k8s-secrets-$DATE.yaml"
    
    # Create encrypted tar archive
    tar -czf "$BACKUP_DIR/omega-secrets-$DATE.tar.gz" \
        "$BACKUP_DIR/vault-secrets-$DATE.json" \
        "$BACKUP_DIR/k8s-secrets-$DATE.yaml"
    
    # Encrypt the archive
    openssl enc -aes-256-cbc -salt -in "$BACKUP_DIR/omega-secrets-$DATE.tar.gz" \
        -out "$BACKUP_DIR/omega-secrets-$DATE.tar.gz.enc" -pass file:"$ENCRYPTION_KEY_FILE"
    
    # Remove unencrypted files
    rm "$BACKUP_DIR/vault-secrets-$DATE.json" \
       "$BACKUP_DIR/k8s-secrets-$DATE.yaml" \
       "$BACKUP_DIR/omega-secrets-$DATE.tar.gz"
    
    # Verify backup integrity
    openssl enc -aes-256-cbc -d -in "$BACKUP_DIR/omega-secrets-$DATE.tar.gz.enc" \
        -pass file:"$ENCRYPTION_KEY_FILE" | tar -tzf - > /dev/null
    
    if [ $? -eq 0 ]; then
        echo "✅ Encrypted secrets backup completed: omega-secrets-$DATE.tar.gz.enc"
    else
        echo "❌ Backup verification failed!"
        exit 1
    fi
    
    # Clean old backups (keep last 30 days)
    find "$BACKUP_DIR" -name "omega-secrets-*.tar.gz.enc" -mtime +30 -delete
    
    echo "$(date -u): Secrets backup completed successfully" >> /var/log/omega/secrets-backup.log

  # ===== DOCKER COMPOSE SECRETS =====
  docker-compose-secrets.yml: |
    # Docker Compose with secrets management
    version: '3.8'
    
    services:
      omega-api:
        image: omega-pro-ai:secure
        secrets:
          - omega_jwt_secret
          - omega_db_password
          - omega_api_key
        environment:
          - JWT_SECRET_FILE=/run/secrets/omega_jwt_secret
          - DB_PASSWORD_FILE=/run/secrets/omega_db_password
          - API_KEY_FILE=/run/secrets/omega_api_key
        
      vault:
        image: vault:latest
        cap_add:
          - IPC_LOCK
        volumes:
          - vault-data:/vault/data
          - vault-logs:/vault/logs
        command: vault server -config=/vault/config/vault.hcl
    
    secrets:
      omega_jwt_secret:
        external: true
      omega_db_password:
        external: true
      omega_api_key:
        external: true
    
    volumes:
      vault-data:
      vault-logs: