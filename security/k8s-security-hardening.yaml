# Kubernetes Security Hardening Configuration for OMEGA PRO AI v10.1
# Implements comprehensive security controls, RBAC, network policies, and pod security standards

apiVersion: v1
kind: Namespace
metadata:
  name: omega-pro-ai
  labels:
    name: omega-pro-ai
    security-policy: strict
    compliance: gdpr-sox-hipaa
  annotations:
    security.omega-pro-ai.com/hardened: "true"
    compliance.omega-pro-ai.com/frameworks: "GDPR,SOX,HIPAA,ISO27001"

---
# Network Policy - Strict Ingress/Egress Controls
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: omega-default-deny
  namespace: omega-pro-ai
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  # Default deny all - policies below will allow specific traffic

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: omega-api-network-policy
  namespace: omega-pro-ai
spec:
  podSelector:
    matchLabels:
      app: omega-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: omega-frontend
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8443  # HTTPS
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 53  # DNS
    - protocol: UDP
      port: 53  # DNS
  - to:
    - podSelector:
        matchLabels:
          app: omega-database
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to: []  # Allow external HTTPS for APIs
    ports:
    - protocol: TCP
      port: 443

---
# Pod Security Policy (deprecated in K8s 1.25, but showing for reference)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: omega-restricted-psp
  namespace: omega-pro-ai
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: 'runtime/default'
    apparmor.security.beta.kubernetes.io/allowedProfileNames: 'runtime/default'
    seccomp.security.alpha.kubernetes.io/defaultProfileName: 'runtime/default'
    apparmor.security.beta.kubernetes.io/defaultProfileName: 'runtime/default'
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  supplementalGroups:
    rule: 'MustRunAs'
    ranges:
      - min: 1
        max: 65535
  fsGroup:
    rule: 'MustRunAs'
    ranges:
      - min: 1
        max: 65535
  readOnlyRootFilesystem: true
  seLinux:
    rule: 'RunAsAny'

---
# Pod Security Standards (K8s 1.25+)
apiVersion: v1
kind: Namespace
metadata:
  name: omega-pro-ai-secure
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    security-policy: maximum

---
# RBAC - Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omega-service-account
  namespace: omega-pro-ai
automountServiceAccountToken: false  # Security hardening

---
# RBAC - ClusterRole for minimal required permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: omega-minimal-role
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
  resourceNames: [] # Restrict to specific pods if needed
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list"]

---
# RBAC - ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: omega-minimal-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: omega-minimal-role
subjects:
- kind: ServiceAccount
  name: omega-service-account
  namespace: omega-pro-ai

---
# Security Context Constraints (OpenShift) or Pod Security Context
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omega-api-secure
  namespace: omega-pro-ai
  labels:
    app: omega-api
    version: v10.1
    security-tier: high
spec:
  replicas: 3
  selector:
    matchLabels:
      app: omega-api
  template:
    metadata:
      labels:
        app: omega-api
        version: v10.1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        container.apparmor.security.beta.kubernetes.io/omega-api: runtime/default
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      serviceAccountName: omega-service-account
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: omega-api
        image: omega-pro-ai:v10.1-secure
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 8443
          name: https
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: SECURITY_MODE
          value: "strict"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: omega-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: omega-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: omega-secrets
              key: jwt-secret
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: omega-secrets
              key: encryption-key
        resources:
          limits:
            memory: "2Gi"
            cpu: "1000m"
            ephemeral-storage: "1Gi"
          requests:
            memory: "1Gi"
            cpu: "500m"
            ephemeral-storage: "500Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: secrets-volume
          mountPath: /app/secrets
          readOnly: true
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir: {}
      - name: config-volume
        configMap:
          name: omega-config
          defaultMode: 0444
      - name: secrets-volume
        secret:
          secretName: omega-secrets
          defaultMode: 0400
      nodeSelector:
        kubernetes.io/os: linux
        node-security-policy: strict
      tolerations:
      - key: "security-node"
        operator: "Equal"
        value: "high-security"
        effect: "NoSchedule"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - omega-api
            topologyKey: kubernetes.io/hostname

---
# ConfigMap for security configurations
apiVersion: v1
kind: ConfigMap
metadata:
  name: omega-security-config
  namespace: omega-pro-ai
data:
  security.yaml: |
    security:
      authentication:
        mfa_required: true
        jwt_expiry: 3600
        refresh_token_expiry: 2592000
        max_failed_attempts: 5
        lockout_duration: 1800
      encryption:
        algorithm: "AES-256-GCM"
        key_rotation_interval: 2592000
        data_at_rest: true
        data_in_transit: true
      audit:
        enabled: true
        retention_days: 2555
        real_time_monitoring: true
        compliance_frameworks:
          - GDPR
          - SOX
          - HIPAA
          - ISO27001
      network:
        tls_min_version: "1.2"
        cipher_suites:
          - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
          - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
        hsts_max_age: 31536000
        content_security_policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
      monitoring:
        intrusion_detection: true
        anomaly_detection: true
        threat_intelligence: true
        security_events_retention: 365
  
  nginx-security.conf: |
    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()" always;
    
    # Hide server information
    server_tokens off;
    more_set_headers "Server: OMEGA-Security-Server";
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 10;
    
    # Request size limits
    client_max_body_size 10M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Timeout settings
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 30s;
    send_timeout 30s;
    
    # SSL/TLS Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

---
# Secret for sensitive configuration (create with kubectl)
apiVersion: v1
kind: Secret
metadata:
  name: omega-secrets
  namespace: omega-pro-ai
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: jwt-secret,encryption-key,database-password
type: Opaque
stringData:
  database-url: "postgresql://omega_user:CHANGE_ME@postgres-service:5432/omega_db?sslmode=require"
  redis-url: "redis://:CHANGE_ME@redis-service:6379/0"
  jwt-secret: "CHANGE_ME_VERY_LONG_RANDOM_STRING_FOR_JWT_SIGNING"
  encryption-key: "CHANGE_ME_32_BYTE_BASE64_ENCODED_ENCRYPTION_KEY"
  smtp-password: "CHANGE_ME_SMTP_PASSWORD"
  oauth-client-secret: "CHANGE_ME_OAUTH_CLIENT_SECRET"

---
# Security Monitoring with Falco
apiVersion: v1
kind: ServiceAccount
metadata:
  name: falco
  namespace: omega-pro-ai

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: falco
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: falco
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: falco
subjects:
- kind: ServiceAccount
  name: falco
  namespace: omega-pro-ai

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: omega-pro-ai
  labels:
    app: falco
    role: security
spec:
  selector:
    matchLabels:
      app: falco
      role: security
  template:
    metadata:
      labels:
        app: falco
        role: security
    spec:
      serviceAccount: falco
      hostNetwork: true
      hostPID: true
      containers:
      - name: falco
        image: falcosecurity/falco:latest
        securityContext:
          privileged: true
        args: ["/usr/bin/falco", "-K", "/var/run/secrets/kubernetes.io/serviceaccount/token", "-k", "https://kubernetes.default", "-pk"]
        volumeMounts:
        - mountPath: /host/var/run/docker.sock
          name: docker-socket
          readOnly: true
        - mountPath: /host/dev
          name: dev-fs
          readOnly: true
        - mountPath: /host/proc
          name: proc-fs
          readOnly: true
        - mountPath: /host/boot
          name: boot-fs
          readOnly: true
        - mountPath: /host/lib/modules
          name: lib-modules
          readOnly: true
        - mountPath: /host/usr
          name: usr-fs
          readOnly: true
        - mountPath: /etc/falco
          name: falco-config
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
      - name: dev-fs
        hostPath:
          path: /dev
      - name: proc-fs
        hostPath:
          path: /proc
      - name: boot-fs
        hostPath:
          path: /boot
      - name: lib-modules
        hostPath:
          path: /lib/modules
      - name: usr-fs
        hostPath:
          path: /usr
      - name: falco-config
        configMap:
          name: falco-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-config
  namespace: omega-pro-ai
data:
  falco.yaml: |
    rules_file:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/falco_rules.local.yaml
      - /etc/falco/k8s_audit_rules.yaml
      - /etc/falco/rules.d
    
    time_format_iso_8601: true
    json_output: true
    json_include_output_property: true
    log_stderr: true
    log_syslog: false
    log_level: INFO
    
    priority: DEBUG
    
    buffered_outputs: true
    outputs_queue_max_size: 32768
    
    syscall_event_drops:
      actions:
        - log
        - alert
      rate: 0.03333
      max_burst: 1000
    
    # Security Rules for OMEGA
    outputs:
      rate: 1
      max_burst: 1000
    
    http_output:
      enabled: true
      url: "http://security-webhook:8080/falco"
      user_agent: "falco"
    
    program_output:
      enabled: false
      keep_alive: false
      program: "jq '{text: .output}' | curl -d @- -X POST https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    
    file_output:
      enabled: true
      filename: /var/log/falco_events.log
      keep_alive: false
  
  omega_security_rules.yaml: |
    # OMEGA Specific Security Rules
    - rule: OMEGA Unauthorized API Access
      desc: Detect unauthorized access to OMEGA API endpoints
      condition: >
        k8s_audit and
        ka.target.resource contains "omega" and
        ka.verb in (create, update, delete) and
        not ka.user.name in (system:serviceaccount:omega-pro-ai:omega-service-account, admin)
      output: >
        Unauthorized OMEGA API access (user=%ka.user.name verb=%ka.verb 
        resource=%ka.target.resource reason=%ka.response_reason)
      priority: HIGH
      tags: [omega, security, unauthorized_access]
    
    - rule: OMEGA Sensitive Data Access
      desc: Detect access to OMEGA sensitive data
      condition: >
        k8s_audit and
        ka.target.resource contains "secret" and
        ka.target.name contains "omega" and
        ka.verb in (get, list) and
        not ka.user.name in (system:serviceaccount:omega-pro-ai:omega-service-account)
      output: >
        OMEGA sensitive data accessed (user=%ka.user.name secret=%ka.target.name 
        verb=%ka.verb)
      priority: CRITICAL
      tags: [omega, data_protection, secrets]
    
    - rule: OMEGA Privilege Escalation
      desc: Detect privilege escalation attempts in OMEGA namespace
      condition: >
        k8s_audit and
        ka.target.namespace="omega-pro-ai" and
        ka.verb in (create, update, patch) and
        ka.target.resource="rolebindings" or ka.target.resource="clusterrolebindings"
      output: >
        OMEGA privilege escalation attempt (user=%ka.user.name 
        resource=%ka.target.resource name=%ka.target.name)
      priority: CRITICAL
      tags: [omega, privilege_escalation, rbac]

---
# Admission Controller - OPA Gatekeeper
apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system

---
apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: omegasecuritypolicy
spec:
  crd:
    spec:
      names:
        kind: OmegaSecurityPolicy
      validation:
        type: object
        properties:
          maxReplicas:
            type: integer
          requiredLabels:
            type: array
            items:
              type: string
          allowedImages:
            type: array
            items:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package omegasecuritypolicy
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not starts_with(container.image, "omega-pro-ai:")
          not contains(input.parameters.allowedImages, container.image)
          msg := sprintf("Container image %v is not allowed", [container.image])
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.privileged == true
          msg := "Privileged containers are not allowed"
        }
        
        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.securityContext.runAsRoot == true
          msg := "Containers cannot run as root"
        }
        
        violation[{"msg": msg}] {
          required := input.parameters.requiredLabels
          provided := input.review.object.metadata.labels
          missing := required[_]
          not provided[missing]
          msg := sprintf("Missing required label: %v", [missing])
        }

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: OmegaSecurityPolicy
metadata:
  name: omega-security-constraints
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces: ["omega-pro-ai"]
  parameters:
    maxReplicas: 10
    requiredLabels: ["app", "version", "security-tier"]
    allowedImages:
      - "omega-pro-ai:*"
      - "postgres:13-alpine"
      - "redis:6-alpine"
      - "nginx:1.21-alpine"

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: omega-api-pdb
  namespace: omega-pro-ai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: omega-api

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omega-api-hpa
  namespace: omega-pro-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omega-api-secure
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
# Security Scanning with Trivy
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trivy-security-scan
  namespace: omega-pro-ai
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: omega-service-account
          containers:
          - name: trivy-scanner
            image: aquasec/trivy:latest
            command:
            - /bin/sh
            - -c
            - |
              trivy image --exit-code 1 --severity HIGH,CRITICAL --format json omega-pro-ai:v10.1-secure > /tmp/scan-results.json
              curl -X POST -H "Content-Type: application/json" -d @/tmp/scan-results.json http://security-webhook:8080/vulnerability-scan
            volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
              readOnly: true
          volumes:
          - name: docker-socket
            hostPath:
              path: /var/run/docker.sock
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001

---
# Ingress with security annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omega-secure-ingress
  namespace: omega-pro-ai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/modsecurity-transaction-id: "$request_id"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "1M"
    nginx.ingress.kubernetes.io/proxy-body-size: "10M"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.omega-pro-ai.com
    secretName: omega-tls-secret
  rules:
  - host: api.omega-pro-ai.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: omega-api-service
            port:
              number: 80
      - path: /health
        pathType: Exact
        backend:
          service:
            name: omega-api-service
            port:
              number: 80
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: omega-api-service
            port:
              number: 8080

---
# Service with security annotations
apiVersion: v1
kind: Service
metadata:
  name: omega-api-service
  namespace: omega-pro-ai
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:region:account:certificate/cert-id"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-ssl-negotiation-policy: "ELBSecurityPolicy-TLS-1-2-2017-01"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: omega-api