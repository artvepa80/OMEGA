# Filebeat Configuration for OMEGA PRO AI v10.1
# Log aggregation and shipping to Elasticsearch

filebeat.inputs:
  # OMEGA API Logs
  - type: log
    enabled: true
    paths:
      - /var/log/omega/*.log
      - /var/log/omega/**/*.log
    fields:
      service: omega-api
      environment: production
      version: "10.1"
    fields_under_root: true
    multiline.pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}'
    multiline.negate: true
    multiline.match: after
    json.keys_under_root: true
    json.add_error_key: true
    
  # Docker Container Logs
  - type: container
    enabled: true
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - drop_event:
          when:
            equals:
              docker.container.labels.log_driver: "none"
    fields:
      log_source: docker
      environment: production
    fields_under_root: true

  # System Logs
  - type: log
    enabled: true
    paths:
      - /var/log/syslog
      - /var/log/auth.log
    fields:
      service: system
      log_type: system
    fields_under_root: true

# Output Configuration
output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "omega-logs-%{+yyyy.MM.dd}"
  template.name: "omega"
  template.pattern: "omega-*"
  template.settings:
    index.number_of_shards: 1
    index.number_of_replicas: 0
    index.refresh_interval: "5s"

# Kibana Configuration
setup.kibana:
  host: "kibana:5601"

# Template and Index Lifecycle Management
setup.template.enabled: true
setup.template.name: "omega"
setup.template.pattern: "omega-*"
setup.ilm.enabled: true
setup.ilm.rollover_alias: "omega-logs"
setup.ilm.pattern: "{now/d}-000001"
setup.ilm.policy: "omega-policy"

# Logging Configuration
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat.log
  keepfiles: 7
  permissions: 0644

# Processors for data enrichment
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~
  - timestamp:
      field: '@timestamp'
      layouts:
        - '2006-01-02T15:04:05Z'
        - '2006-01-02T15:04:05.000Z'
      test:
        - '2023-08-15T14:30:00Z'