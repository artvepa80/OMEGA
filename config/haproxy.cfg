# HAProxy Configuration for OMEGA PRO AI v10.1
# High-availability load balancer configuration

global
    # Global settings
    daemon
    user haproxy
    group haproxy
    chroot /var/lib/haproxy
    
    # Performance tuning
    nbthread 2
    maxconn 4096
    tune.ssl.default-dh-param 2048
    
    # Security
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets
    
    # Logging
    log stdout local0 info

defaults
    # Default settings for all sections
    mode http
    log global
    option httplog
    option dontlognull
    option log-health-checks
    option redispatch
    
    # Timeouts
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 5s
    timeout http-keep-alive 3s
    timeout check 3s
    
    # Error pages
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# Frontend - HTTP (redirect to HTTPS)
frontend omega_http
    bind *:80
    mode http
    
    # Security headers
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection \"1; mode=block\"
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    
    # Redirect HTTP to HTTPS
    redirect scheme https code 301 if !{ ssl_fc }

# Frontend - HTTPS
frontend omega_https
    bind *:443 ssl crt /etc/ssl/certs/omega.pem
    mode http
    
    # Security headers
    http-response set-header Strict-Transport-Security \"max-age=31536000; includeSubDomains; preload\"
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection \"1; mode=block\"
    http-response set-header Referrer-Policy strict-origin-when-cross-origin
    
    # Rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s),http_err_rate(10s),conn_rate(3s),sess_rate(3s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 20 }
    http-request deny if { sc_http_err_rate(0) gt 10 }
    
    # API routing
    use_backend omega_api if { path_beg /api/ } or { path_beg /predict } or { path_beg /health }
    use_backend omega_api if { path_beg /metrics } or { path_beg /docs } or { path_beg /redoc }
    
    # Monitoring routing
    use_backend grafana if { hdr(host) -i monitoring.omega-pro-ai.com }
    use_backend prometheus if { path_beg /prometheus/ }
    
    # Default backend
    default_backend omega_api

# Backend - OMEGA API Servers
backend omega_api
    mode http
    balance roundrobin
    
    # Health checks
    option httpchk GET /health
    http-check expect status 200
    
    # Server configuration
    server omega_primary omega_api_primary:8000 check inter 10s fall 3 rise 2 weight 100
    server omega_secondary omega_api_secondary:8001 check inter 10s fall 3 rise 2 weight 80 backup
    
    # Connection settings
    default-server maxconn 100
    
    # Load balancing options
    option persist
    cookie SERVERID insert indirect nocache
    
    # Error handling
    option abortonclose
    option redispatch
    retries 3

# Backend - Grafana
backend grafana
    mode http
    balance roundrobin
    
    option httpchk GET /api/health
    http-check expect status 200
    
    server grafana_server omega_grafana:3000 check inter 30s fall 2 rise 3

# Backend - Prometheus
backend prometheus
    mode http
    balance roundrobin
    
    option httpchk GET /-/healthy
    http-check expect status 200
    
    server prometheus_server omega_prometheus:9090 check inter 30s fall 2 rise 3

# Stats interface
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats admin if TRUE
    stats refresh 30s
    stats show-legends
    stats show-node
    
    # Authentication (change in production)
    stats auth admin:omega123
    
    # Additional stats
    stats show-desc \"OMEGA PRO AI v10.1 Load Balancer\"