version: "3.9"

services:
  # API principal (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: omega_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./outputs:/app/outputs
    command: uvicorn api_interface:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  # UI Next.js
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    container_name: omega_ui
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

  # Redis opcional
  redis:
    image: redis:7-alpine
    container_name: omega_redis
    ports:
      - "6379:6379"

  # WhatsApp bridge opcional (si ya configuraste antes)
  bridge:
    build: .
    container_name: omega-whatsapp-bridge
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8000"
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      - ngrok

  ngrok:
    image: ngrok/ngrok:latest
    container_name: omega_ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    command:
      - "http"
      - "--log=stdout"
      - "bridge:8000"
    ports:
      - "4040:4040"


