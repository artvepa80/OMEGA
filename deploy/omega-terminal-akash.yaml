---
version: "2.0"

services:
  omega-terminal:
    image: artvepa80/omega-ai:latest
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
    env:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - PORT=8000
    command:
      - "python3"
    args:
      - "omega_akash_terminal.py"

profiles:
  compute:
    omega-terminal:
      resources:
        cpu:
          units: 2.0
        memory:
          size: 4Gi
        storage:
          size: 20Gi
  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
          - akash18qa2a2ltfyvkyj0ggj3hkvuj6twzyumuaru9s4
      pricing:
        omega-terminal:
          denom: uakt
          amount: 500

deployment:
  omega-terminal:
    akash:
      profile: omega-terminal
      count: 1