# OMEGA PRO AI v10.1 - Secure Production Deployment for Akash Network
# Integration of security infrastructure with existing deployment systems
# Comprehensive production-ready configuration with security hardening

version: '2.0'

services:
  # Main API Service with Security Hardening
  omega-api-secure:
    image: ghcr.io/omega-pro-ai/omega-secure:latest
    expose:
    - port: 8000
      as: 80
      to:
      - global: true
        accept:
        - "omega-ai.com"
        - "api.omega-ai.com"
    - port: 8443
      as: 443
      to:
      - global: true
        accept:
        - "omega-ai.com"
        - "api.omega-ai.com"
    env:
    # Security Configuration
    - OMEGA_ENV=production
    - SECURITY_MODE=strict
    - SSL_ENABLED=true
    - SECURITY_HEADERS=true
    - CORS_ENABLED=true
    - RATE_LIMITING=true
    - AUTH_REQUIRED=true
    - AUDIT_LOGGING=enabled
    - ENCRYPTION_LEVEL=AES256
    - FAIL2BAN_ENABLED=true
    
    # JWT and Session Security
    - JWT_SECRET=${JWT_SECRET}
    - JWT_EXPIRATION=1800
    - SESSION_SECRET=${SESSION_SECRET}
    - SESSION_TIMEOUT=3600
    
    # Database and Cache
    - REDIS_URL=redis://redis-secure:6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - DATABASE_URL=${DATABASE_URL_ENCRYPTED}
    
    # Monitoring and Logging
    - LOG_LEVEL=INFO
    - HEALTH_CHECK_ENABLED=true
    - PROMETHEUS_ENABLED=true
    - AUDIT_RETENTION_DAYS=90
    
    # API Security Limits
    - MAX_REQUEST_SIZE=10M
    - REQUEST_TIMEOUT=120
    - MAX_CONCURRENT_REQUESTS=100
    - API_RATE_LIMIT=10/minute
    - LOGIN_RATE_LIMIT=3/minute
    
    resources:
      cpu:
        units: 2.0
      memory:
        size: 4Gi
      storage:
      - size: 20Gi
        attributes:
          persistent: true
          class: ssd

  # GPU Service with Security Controls
  omega-gpu-secure:
    image: ghcr.io/omega-pro-ai/omega-gpu-secure:latest
    expose:
    - port: 8001
      to:
      - service: omega-api-secure
      - service: nginx-security-proxy
    env:
    # GPU Security Configuration
    - CUDA_VISIBLE_DEVICES=0
    - NVIDIA_VISIBLE_DEVICES=all
    - GPU_SECURITY_MODE=strict
    - GPU_MEMORY_LIMIT=90
    - GPU_PROCESS_ISOLATION=enabled
    - GPU_TEMPERATURE_MONITORING=enabled
    - CONCURRENT_GPU_REQUESTS=2
    - GPU_TIMEOUT_SECONDS=300
    
    # Security Settings
    - SSL_ENABLED=true
    - INTERNAL_AUTH=true
    - AUDIT_LOGGING=enabled
    - SECURITY_HEADERS=true
    
    # Cache and Database
    - REDIS_URL=redis://redis-secure:6379
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    
    # Performance and Monitoring
    - LOG_LEVEL=INFO
    - HEALTH_CHECK_ENABLED=true
    - GPU_MONITORING_ENABLED=true
    
    resources:
      cpu:
        units: 4.0
      memory:
        size: 8Gi
      storage:
      - size: 100Gi
        attributes:
          persistent: true
          class: ssd
      gpu:
        units: 1
        attributes:
          vendor:
            nvidia:
            - model: rtx4090
              ram: 24Gi

  # Secure Redis with Encryption
  redis-secure:
    image: redis:7-alpine
    command:
    - redis-server
    - --requirepass
    - ${REDIS_PASSWORD}
    - --maxmemory
    - 2gb
    - --maxmemory-policy
    - allkeys-lru
    # Enable persistence with encryption
    - --save
    - '900'
    - '1'
    - --save
    - '300'
    - '10'
    - --save
    - '60'
    - '10000'
    # Security settings
    - --protected-mode
    - 'yes'
    - --tcp-keepalive
    - '300'
    - --timeout
    - '300'
    expose:
    - port: 6379
      to:
      - service: omega-api-secure
      - service: omega-gpu-secure
      - service: monitoring-stack
    env:
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - REDIS_ENCRYPTION=enabled
    resources:
      cpu:
        units: 1.0
      memory:
        size: 2Gi
      storage:
      - size: 20Gi
        attributes:
          persistent: true
          class: ssd

  # NGINX Security Proxy
  nginx-security-proxy:
    image: nginx:alpine
    expose:
    - port: 80
      as: 80
      to:
      - global: true
    - port: 443
      as: 443
      to:
      - global: true
    env:
    - SSL_ENABLED=true
    - SECURITY_HEADERS=true
    - RATE_LIMITING=true
    - DDoS_PROTECTION=enabled
    - WAF_ENABLED=true
    - SSL_CERT_PATH=/etc/ssl/certs/omega.pem
    - SSL_KEY_PATH=/etc/ssl/private/omega.key
    resources:
      cpu:
        units: 1.0
      memory:
        size: 1Gi
      storage:
      - size: 5Gi

  # Security Monitoring Stack
  monitoring-stack:
    image: prom/prometheus:latest
    expose:
    - port: 9090
      to:
      - service: grafana-secure
    env:
    - PROMETHEUS_RETENTION=90d
    - PROMETHEUS_STORAGE_TSDB_RETENTION_TIME=90d
    - SECURITY_MONITORING=enabled
    resources:
      cpu:
        units: 1.0
      memory:
        size: 2Gi
      storage:
      - size: 50Gi
        attributes:
          persistent: true

  # Secure Grafana Dashboard
  grafana-secure:
    image: grafana/grafana:latest
    expose:
    - port: 3000
      to:
      - global: true
        accept:
        - "monitoring.omega-ai.com"
    env:
    - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY}
    - GF_SECURITY_DISABLE_GRAVATAR=true
    - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
    - GF_SECURITY_X_CONTENT_TYPE_OPTIONS=nosniff
    - GF_SECURITY_X_XSS_PROTECTION=true
    - GF_AUTH_ANONYMOUS_ENABLED=false
    - GF_AUTH_BASIC_ENABLED=true
    - GF_SSL_MODE=require
    resources:
      cpu:
        units: 0.5
      memory:
        size: 1Gi
      storage:
      - size: 10Gi
        attributes:
          persistent: true

  # HashiCorp Vault for Secrets Management
  vault-secure:
    image: vault:latest
    expose:
    - port: 8200
      to:
      - service: omega-api-secure
      - service: omega-gpu-secure
    env:
    - VAULT_ADDR=https://0.0.0.0:8200
    - VAULT_API_ADDR=https://vault-secure:8200
    - VAULT_CLUSTER_ADDR=https://vault-secure:8201
    - VAULT_UI=true
    - VAULT_LOG_LEVEL=INFO
    - VAULT_SEAL_TYPE=awskms
    resources:
      cpu:
        units: 1.0
      memory:
        size: 2Gi
      storage:
      - size: 20Gi
        attributes:
          persistent: true
          encrypted: true

  # ELK Stack for Security Logging
  elasticsearch-security:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    expose:
    - port: 9200
      to:
      - service: kibana-security
      - service: logstash-security
    env:
    - discovery.type=single-node
    - xpack.security.enabled=true
    - xpack.security.transport.ssl.enabled=true
    - xpack.security.http.ssl.enabled=true
    - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
    resources:
      cpu:
        units: 2.0
      memory:
        size: 4Gi
      storage:
      - size: 100Gi
        attributes:
          persistent: true

  # Kibana for Security Dashboard
  kibana-security:
    image: docker.elastic.co/kibana/kibana:8.10.0
    expose:
    - port: 5601
      to:
      - global: true
        accept:
        - "security.omega-ai.com"
    env:
    - ELASTICSEARCH_HOSTS=https://elasticsearch-security:9200
    - ELASTICSEARCH_USERNAME=kibana_system
    - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    - SERVER_SSL_ENABLED=true
    - XPACK_SECURITY_ENABLED=true
    resources:
      cpu:
        units: 1.0
      memory:
        size: 2Gi
      storage:
      - size: 10Gi

  # Logstash for Log Processing
  logstash-security:
    image: docker.elastic.co/logstash/logstash:8.10.0
    expose:
    - port: 5044
      to:
      - service: filebeat-collector
    env:
    - xpack.monitoring.elasticsearch.hosts=https://elasticsearch-security:9200
    - xpack.monitoring.elasticsearch.username=logstash_system
    - xpack.monitoring.elasticsearch.password=${LOGSTASH_PASSWORD}
    resources:
      cpu:
        units: 2.0
      memory:
        size: 3Gi
      storage:
      - size: 20Gi

  # Security Automation Service
  security-automation:
    image: ghcr.io/omega-pro-ai/security-automation:latest
    expose:
    - port: 8080
      to:
      - service: alertmanager-security
    env:
    - SECURITY_AUTOMATION_ENABLED=true
    - AUTO_BLOCK_THREATS=true
    - FAIL2BAN_INTEGRATION=enabled
    - SLACK_NOTIFICATIONS=enabled
    - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    - INCIDENT_RESPONSE=automated
    resources:
      cpu:
        units: 0.5
      memory:
        size: 512Mi
      storage:
      - size: 5Gi

  # Alertmanager for Security Alerts
  alertmanager-security:
    image: prom/alertmanager:latest
    expose:
    - port: 9093
      to:
      - service: monitoring-stack
      - service: security-automation
    env:
    - ALERTMANAGER_STORAGE_RETENTION=720h  # 30 days
    - SMTP_SMARTHOST=${SMTP_HOST}
    - SMTP_FROM=${ALERT_EMAIL_FROM}
    - PAGERDUTY_ENABLED=true
    resources:
      cpu:
        units: 0.5
      memory:
        size: 512Mi
      storage:
      - size: 10Gi

