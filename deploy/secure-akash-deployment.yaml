version: "2.0"

services:
  omega-api:
    image: ghcr.io/omega-pro-ai/omega-api:latest
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
      - port: 8443
        as: 443
        to:
          - global: true
    env:
      - OMEGA_ENV=production
      - SSL_CERT_PATH=/app/ssl/cert.pem
      - SSL_KEY_PATH=/app/ssl/key.pem
      - DOMAIN=omega-api.akash.network
      - ENABLE_SSL=true
      - SSL_PROTOCOLS=TLSv1.2,TLSv1.3
      - SECURITY_HEADERS=true
      - LOG_LEVEL=INFO
    resources:
      cpu:
        units: 2.0
      memory:
        size: 4Gi
      storage:
        - size: 20Gi

  omega-gpu:
    image: ghcr.io/omega-pro-ai/omega-gpu:latest
    expose:
      - port: 8001
        to:
          - service: omega-api
    env:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - GPU_MEMORY_STRATEGY=balanced
      - SSL_ENABLED=true
    resources:
      cpu:
        units: 4.0
      memory:
        size: 8Gi
      storage:
        - size: 100Gi
      gpu:
        units: 1
        attributes:
          vendor:
            nvidia:
              - model: rtx4090
                ram: 24Gi

  redis:
    image: redis:7-alpine
    expose:
      - port: 6379
        to:
          - service: omega-api
          - service: omega-gpu
    resources:
      cpu:
        units: 0.5
      memory:
        size: 1Gi
      storage:
        - size: 10Gi

profiles:
  compute:
    omega-api:
      resources:
        cpu:
          units: 2.0
        memory:
          size: 4Gi
        storage:
          - size: 20Gi
    omega-gpu:
      resources:
        cpu:
          units: 4.0
        memory:
          size: 8Gi
        storage:
          - size: 100Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: rtx4090
                  ram: 24Gi
    redis:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 1Gi
        storage:
          - size: 10Gi
  placement:
    dcloud:
      attributes:
        host: akash
        region: us-west
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
          - akash18qa2a2ltfyvkyumuaru9s4
      pricing:
        omega-api:
          denom: uakt
          amount: 333
        omega-gpu:
          denom: uakt
          amount: 1000
        redis:
          denom: uakt
          amount: 100

deployment:
  omega-api:
    dcloud:
      profile: omega-api
      count: 1
  omega-gpu:
    dcloud:
      profile: omega-gpu
      count: 1
  redis:
    dcloud:
      profile: redis
      count: 1