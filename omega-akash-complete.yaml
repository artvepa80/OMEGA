version: "2.0"

services:
  # OMEGA PRO AI v10.1 - Complete System
  omega-complete:
    image: ghcr.io/artvepa80/omega-ai:complete-v10.1
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
        accept:
          - "*.omega-akash.network"
          - omega-complete.akash.network
        http_options:
          max_body_size: 104857600  # 100MB para ML models
    env:
      - OMEGA_ENV=production
      - OMEGA_VERSION=v10.1
      - OMEGA_COMPLETE=true
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - PERFORMANCE_MODE=optimized
      - SSL_ENABLED=false  # Akash handles SSL
      - LOG_LEVEL=INFO
      - HEALTH_CHECK_ENABLED=true
      - MAX_WORKERS=2
      - TIMEOUT=300
      - PORT=8000
    resources:
      cpu:
        units: "2.0"
      memory:
        size: 4Gi
      storage:
        - size: 20Gi

profiles:
  compute:
    omega-complete:
      resources:
        cpu:
          units: "2.0"
        memory:
          size: 4Gi
        storage:
          - size: 20Gi

  placement:
    akash:
      attributes:
        host: akash
        region: us-west
        tier: community
      pricing:
        omega-complete:
          denom: uakt
          amount: 500  # ~$0.10/hour

deployment:
  omega-complete:
    akash:
      profile: omega-complete
      count: 1

# Deployment metadata
metadata:
  name: omega-complete-v10.1
  version: "10.1.0"
  description: "OMEGA Pro AI Complete System - Multi-Arch Optimized"
  architecture: "multi (amd64/arm64)"
  created_by: "OMEGA GitHub Actions"
  tags:
    - production
    - multi-arch
    - optimized
    - complete
    - v10.1