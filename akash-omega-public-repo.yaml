---
version: "2.0"

services:
  omega-ai:
    image: python:3.11-slim
    command:
      - "bash"
      - "-c"
      - |
        echo "🚀 OMEGA PRO AI v10.1 - PUBLIC REPO DEPLOYMENT"
        echo "💻 Resources: 16 CPU cores, 32GB RAM, 200GB Storage"
        echo "📦 Repository: https://github.com/artvepa80/OMEGA (PUBLIC)"
        
        # Install system dependencies quickly
        apt-get update && apt-get install -y \
          curl git wget build-essential \
          python3-dev libffi-dev libssl-dev \
          htop nano vim tmux procps && \
        
        echo "📥 Cloning OMEGA from public GitHub repo..."
        git clone https://github.com/artvepa80/OMEGA.git /app && \
        cd /app && \
        
        echo "✅ Repository cloned successfully!"
        echo "📋 Available files:"
        ls -la
        
        echo "🐍 Installing Python dependencies with optimization..."
        pip install --no-cache-dir --upgrade pip setuptools wheel && \
        
        # Install core ML libraries first (faster)
        pip install --no-cache-dir flask requests numpy pandas && \
        
        # Install from requirements.txt
        if [ -f requirements.txt ]; then
          echo "📦 Installing from requirements.txt..."
          pip install --no-cache-dir -r requirements.txt
        else
          echo "⚠️ requirements.txt not found, installing basic packages..."
          pip install --no-cache-dir scikit-learn matplotlib seaborn
        fi
        
        echo "🔧 Configuring OMEGA for maximum Akash performance..."
        export OMEGA_VERSION=v10.1
        export OMEGA_PUBLIC_REPO=true
        export PYTHONUNBUFFERED=1
        export PYTHONPATH=/app
        export PORT=8000
        export AKASH_DEPLOYMENT=true
        
        # Performance optimization for 16 CPU
        export OMP_NUM_THREADS=16
        export MKL_NUM_THREADS=16
        export NUMBA_NUM_THREADS=16
        
        echo "🎯 OMEGA Configuration:"
        echo "   - Version: v10.1"
        echo "   - CPU Cores: 16 (full power)"
        echo "   - Memory: 32GB (maximum)"
        echo "   - Storage: 200GB (complete)"
        echo "   - Repository: PUBLIC GitHub"
        
        echo "✅ OMEGA PRO AI v10.1 Ready!"
        echo "🌐 Starting server on port 8000..."
        echo "🎊 Access: http://your-akash-url/"
        
        # Start OMEGA server
        if [ -f omega_server.py ]; then
          echo "🎯 Starting omega_server.py..."
          python3 omega_server.py
        elif [ -f main.py ]; then
          echo "🎯 Starting main.py..."
          python3 main.py
        else
          echo "❌ No server file found, creating minimal server..."
          cat > minimal_omega.py << 'EOF'
from flask import Flask, jsonify
app = Flask(__name__)

@app.route('/')
def home():
    return '''<h1>🔮 OMEGA PRO AI v10.1</h1>
    <h2>✅ Running on Akash Network!</h2>
    <p><strong>16 CPU + 32GB RAM + 200GB Storage</strong></p>
    <a href="/health">Health Check</a>'''

@app.route('/health')
def health():
    return jsonify({"status": "OK", "version": "v10.1", "platform": "Akash"})

if __name__ == '__main__':
    app.run(host='0.0.0.0', port=8000)
EOF
          python3 minimal_omega.py
        fi
        
    env:
      - "OMEGA_VERSION=v10.1"
      - "OMEGA_PUBLIC_REPO=true"
      - "PYTHONUNBUFFERED=1"
      - "PYTHONPATH=/app"
      - "PORT=8000"
      - "AKASH_DEPLOYMENT=true"
      - "OMP_NUM_THREADS=16"
      - "MKL_NUM_THREADS=16"
      
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
          
profiles:
  compute:
    omega-ai:
      resources:
        cpu:
          units: 16000m  # ALL 16 CPU cores
        memory:
          size: 32Gi    # ALL 32GB RAM  
        storage:
          - size: 200Gi # ALL 200GB storage
            
  placement:
    akash:
      pricing:
        omega-ai: 
          denom: uakt
          amount: 2500000  # Premium for max resources

deployment:
  omega-ai:
    akash:
      profile: omega-ai
      count: 1