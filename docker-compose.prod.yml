version: '3.8'

# OMEGA PRO AI v10.1 - Production Docker Compose
# Comprehensive production setup with monitoring, load balancing, and high availability

services:
  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: omega_redis_prod
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --save 900 1 
      --save 300 10 
      --save 60 10000
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - omega_backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Main OMEGA API - Primary Instance
  omega_api_primary:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: omega_api_primary
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PORT=8000
      - WORKERS=3
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - INSTANCE_ID=primary
      - PYTHONUNBUFFERED=1
      - PROMETHEUS_METRICS=true
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - omega_backend
      - omega_frontend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # OMEGA API - Secondary Instance for High Availability
  omega_api_secondary:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: omega_api_secondary
    depends_on:
      redis:
        condition: service_healthy
      omega_api_primary:
        condition: service_healthy
    environment:
      - PORT=8001
      - WORKERS=2
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - INSTANCE_ID=secondary
      - PYTHONUNBUFFERED=1
      - PROMETHEUS_METRICS=true
    env_file:
      - .env.production
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - omega_backend
      - omega_frontend
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Load Balancer (HAProxy)
  loadbalancer:
    image: haproxy:2.8-alpine
    container_name: omega_loadbalancer
    depends_on:
      - omega_api_primary
      - omega_api_secondary
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"  # HAProxy stats
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./ssl:/etc/ssl/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8404"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - omega_frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: omega_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - omega_monitoring
      - omega_backend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # Grafana for visualization and dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: omega_grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-omega123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/plugins:/var/lib/grafana/plugins:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - omega_monitoring
    user: "472:0"  # Grafana user
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ElasticSearch for log aggregation
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: omega_elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - omega_monitoring
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Kibana for log visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.0
    container_name: omega_kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - omega_monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Filebeat for log shipping
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.9.0
    container_name: omega_filebeat
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./config/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/omega:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - omega_monitoring
    user: root
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # Backup service
  backup:
    image: alpine:3.18
    container_name: omega_backup
    depends_on:
      - redis
    volumes:
      - ./backups:/backups
      - ./data:/app/data:ro
      - redis_data:/redis_data:ro
    environment:
      - BACKUP_RETENTION_DAYS=30
      - BACKUP_SCHEDULE=0 2 * * *  # Daily at 2 AM
    command: >
      sh -c '
      apk add --no-cache redis dcron &&
      echo "0 2 * * * /usr/bin/redis-cli -h redis --rdb /backups/redis-\$$(date +%Y%m%d_%H%M%S).rdb" | crontab - &&
      echo "30 2 * * * tar -czf /backups/data-\$$(date +%Y%m%d_%H%M%S).tar.gz -C /app/data ." | crontab - &&
      echo "0 3 * * * find /backups -name "*.rdb" -mtime +\$$BACKUP_RETENTION_DAYS -delete" | crontab - &&
      echo "30 3 * * * find /backups -name "*.tar.gz" -mtime +\$$BACKUP_RETENTION_DAYS -delete" | crontab - &&
      crond -f -d 8
      '
    restart: unless-stopped
    networks:
      - omega_backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# Named volumes for data persistence
volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

# Networks for service isolation
networks:
  omega_frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  omega_backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  omega_monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24