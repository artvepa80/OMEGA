  version: 0.2
  phases:
    pre_build:
      commands:
        - echo Logging in to Amazon ECR...
        - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin
  802221302896.dkr.ecr.us-east-1.amazonaws.com
    build:
      commands:
        - echo Build started
        - docker build -t omega-pro-ai .
        - docker tag omega-pro-ai:latest 802221302896.dkr.ecr.us-east-1.amazonaws.com/omega-pro-ai:latest
    post_build:
      commands:
        - echo Build completed
        - docker push 802221302896.dkr.ecr.us-east-1.amazonaws.com/omega-pro-ai:latest
