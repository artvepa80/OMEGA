version: '3.8'

services:
  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: omega-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-omega_redis_2024}
    networks:
      - omega-network
    restart: unless-stopped

  # Main OMEGA API
  omega-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: omega-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-omega_redis_2024}@redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://omega:omega123@postgres:5432/omega_db}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - OAUTH_SECRET_KEY=${OAUTH_SECRET_KEY:-your-secret-key-here}
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./checkpoints:/app/checkpoints
    networks:
      - omega-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: omega-postgres
    environment:
      - POSTGRES_DB=omega_db
      - POSTGRES_USER=omega
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-omega123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - omega-network
    restart: unless-stopped

  # Asian Markets Service
  omega-asian:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.asian
    container_name: omega-asian
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-omega_redis_2024}@redis:6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://omega:omega123@postgres:5432/omega_db}
      - ASIAN_MARKETS_ENABLED=true
      - DEFAULT_LANGUAGE=zh
    depends_on:
      - redis
      - postgres
    networks:
      - omega-network
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: omega-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - omega-api
      - omega-asian
    networks:
      - omega-network
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: omega-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - omega-network
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: omega-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - omega-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  omega-network:
    driver: bridge