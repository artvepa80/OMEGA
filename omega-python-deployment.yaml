version: "2.0"

services:
  omegaproaiv10:
    image: python:3.11-slim
    command:
      - "bash"
      - "-c"
      - |
        apt-get update && apt-get install -y git curl wget
        pip install fastapi uvicorn requests numpy pandas scikit-learn torch
        git clone https://github.com/artvepa80/omega-ai.git /app || echo "Using local code"
        cd /app
        python3 -m http.server 8000
    expose:
      - port: 8000
        as: 80
        to:
          - global: true
        http_options:
          max_body_size: 104857600
    env:
      - OMEGA_ENV=production
      - PERFORMANCE_MODE=cpu_optimized
      - PORT=8000
    resources:
      cpu:
        units: "8.0"
      memory:
        size: 12Gi
      storage:
        - size: 40Gi

profiles:
  compute:
    omegaproaiv10:
      resources:
        cpu:
          units: "8.0"
        memory:
          size: 12Gi
        storage:
          - size: 40Gi

  placement:
    dcloud:
      pricing:
        omegaproaiv10:
          denom: uakt
          amount: 150

deployment:
  omegaproaiv10:
    dcloud:
      profile: omegaproaiv10
      count: 1